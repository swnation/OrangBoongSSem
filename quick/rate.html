<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>두통 경과 기록</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafaf5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 20px rgba(0,0,0,.08);padding:28px 24px;max-width:360px;width:90vw;text-align:center}
.icon{font-size:2.5rem;margin-bottom:12px}
h1{font-size:1.1rem;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:.78rem;color:#888;margin-bottom:16px}
.entry-box{background:#f8f8f0;border-radius:10px;padding:12px 14px;margin-bottom:18px;text-align:left}
.entry-time{font-size:.92rem;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.entry-detail{font-size:.75rem;color:#666;line-height:1.5}
.entry-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.68rem;margin:1px 2px}
.elapsed{font-size:.72rem;color:#4f6d7a;margin-bottom:16px}
.buttons{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border:2px solid;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-better{background:#f0fdf4;border-color:#86efac;color:#15803d}
.btn-better:hover{background:#dcfce7}
.btn-same{background:#fffbeb;border-color:#fde68a;color:#92400e}
.btn-same:hover{background:#fef3c7}
.btn-worse{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
.btn-worse:hover{background:#fee2e2}
.done{padding:24px}
.done .check{font-size:3rem;margin-bottom:12px}
.done h2{font-size:1.1rem;color:#15803d;margin-bottom:6px}
.done p{font-size:.82rem;color:#888}
.done .link{display:inline-block;margin-top:16px;font-size:.78rem;color:#4f6d7a;text-decoration:underline}
.already{padding:20px}
.already .icon2{font-size:2rem;margin-bottom:8px}
.already h2{font-size:1rem;color:#4f6d7a;margin-bottom:4px}
.already p{font-size:.78rem;color:#888}
.already .link{display:inline-block;margin-top:14px;font-size:.78rem;color:#4f6d7a;text-decoration:underline}
.error{color:#b91c1c;font-size:.85rem;padding:20px}
@media(prefers-color-scheme:dark){
  body{background:#0d1117}
  .card{background:#161b22;box-shadow:0 2px 20px rgba(0,0,0,.3)}
  h1{color:#e6edf3}
  .sub{color:#8b949e}
  .entry-box{background:#1c2128}
  .entry-time{color:#e6edf3}
  .entry-detail{color:#8b949e}
  .elapsed{color:#58a6ff}
  .btn-better{background:#0d2a1a;border-color:#2d8a5a;color:#4ade80}
  .btn-same{background:#2a1a0a;border-color:#92400e;color:#fbbf24}
  .btn-worse{background:#2a0d0d;border-color:#b91c1c;color:#f87171}
  .done h2{color:#4ade80}
  .done p,.already p{color:#8b949e}
  .done .link,.already .link{color:#58a6ff}
  .already h2{color:#8b949e}
  .error{color:#f87171}
  #confirm-bar p{color:#e6edf3}
  #confirm-bar button:last-child{border-color:#444;color:#8b949e}
}
</style>
</head>
<body>
<div class="card" id="main">
  <div class="icon">🤕</div>
  <h1>두통 경과 기록</h1>
  <div class="sub" id="sub-text">지금 어떠세요?</div>
  <div id="entry-box" class="entry-box" style="display:none">
    <div class="entry-time" id="entry-time"></div>
    <div class="entry-detail" id="entry-detail"></div>
  </div>
  <div id="elapsed" class="elapsed" style="display:none"></div>
  <div id="buttons" class="buttons">
    <button class="btn btn-better" id="sel-better" onclick="selectRating('better')">😊 호전됐어요</button>
    <button class="btn btn-same" id="sel-same" onclick="selectRating('same')">😐 비슷해요</button>
    <button class="btn btn-worse" id="sel-worse" onclick="selectRating('worse')">😣 악화됐어요</button>
  </div>
  <div id="confirm-bar" style="display:none;margin-top:12px;text-align:center">
    <p id="confirm-text" style="font-size:.85rem;font-weight:600;margin-bottom:10px"></p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="confirmRate()" style="padding:12px 28px;border-radius:10px;border:none;background:#15803d;color:#fff;font-size:.92rem;font-weight:700;cursor:pointer;font-family:inherit">✅ 저장</button>
      <button onclick="cancelSelect()" style="padding:12px 20px;border-radius:10px;border:1.5px solid #ccc;background:none;color:#888;font-size:.85rem;cursor:pointer;font-family:inherit">취소</button>
    </div>
  </div>
  <div id="done" class="done" style="display:none">
    <div class="check">✅</div>
    <h2 id="done-text">경과 저장 완료!</h2>
    <p id="done-sub"></p>
    <a class="link" href="./index.html">빠른 기록 앱 열기 →</a>
  </div>
  <div id="already" class="already" style="display:none">
    <div class="icon2">✅</div>
    <h2 id="already-text"></h2>
    <p id="already-sub"></p>
    <button onclick="showChangeUI()" style="display:block;margin:12px auto 0;padding:8px 20px;border-radius:8px;border:1.5px solid #4f6d7a;background:none;color:#4f6d7a;font-size:.78rem;cursor:pointer;font-family:inherit">🔄 경과 변경하기</button>
    <a class="link" href="./index.html">빠른 기록 앱 열기 →</a>
  </div>
  <div id="error" class="error" style="display:none"></div>
</div>

<script>
const LS_KEY='om_quick_logs';
const labels={better:'😊 호전',same:'😐 비슷',worse:'😣 악화',unknown:'🤷 기억 안남'};

function getLogs(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch{return [];}}
function saveLogs(logs){localStorage.setItem(LS_KEY,JSON.stringify(logs));}

function parseHash(){
  const h=location.hash;
  const m=h.match(/^#rate-(better|same|worse)-(\d+)$/);
  if(m) return {rating:m[1],id:m[2]};
  const m2=h.match(/^#(\d+)$/);
  if(m2) return {rating:null,id:m2[1]};
  return {rating:null,id:null};
}

function findEntry(id){
  const logs=getLogs();
  if(id){
    const entry=logs.find(l=>String(l.id)===String(id));
    if(entry) return entry;
  }
  // ID 없거나 못 찾으면 가장 최근 미평가 기록
  for(let i=logs.length-1;i>=0;i--){
    if(logs[i]._type==='config') continue;
    if(!logs[i].outcome) return logs[i];
  }
  return null;
}

function showEntryInfo(entry){
  if(!entry) return;
  const dt=entry.datetime||'';
  const date=dt.slice(0,10);
  const time=dt.slice(11,16);
  const timeLabel=time==='시간미상'?'시간미상':time;

  // 시작 시간
  document.getElementById('entry-time').textContent=`${date} ${timeLabel} 시작된 두통`;

  // 상세 정보
  const parts=[];
  if(entry.nrs>=0) parts.push('NRS '+entry.nrs);
  if(entry.sites?.length) parts.push(entry.sites.join(', '));
  if(entry.meds?.length) parts.push('💊 '+entry.meds.join(', '));
  if(entry.triggers?.length) parts.push('⚡ '+entry.triggers.join(', '));
  document.getElementById('entry-detail').textContent=parts.join(' · ');
  document.getElementById('entry-box').style.display='';

  // 경과 시간
  if(time!=='시간미상'){
    const entryTime=new Date(dt).getTime();
    const now=Date.now();
    const diffMin=Math.round((now-entryTime)/60000);
    let elapsed='';
    if(diffMin<60) elapsed=diffMin+'분 경과';
    else if(diffMin<1440) elapsed=Math.floor(diffMin/60)+'시간 '+diffMin%60+'분 경과';
    else elapsed=Math.floor(diffMin/1440)+'일 경과';
    document.getElementById('elapsed').textContent='⏱ 두통 시작 후 '+elapsed;
    document.getElementById('elapsed').style.display='';
  }
}

function showAlreadyRated(entry){
  const rating=entry.outcome?.rating;
  document.getElementById('buttons').style.display='none';
  document.getElementById('sub-text').style.display='none';
  document.getElementById('already').style.display='';
  document.getElementById('already-text').textContent='이미 경과가 기록되어 있어요';
  document.getElementById('already-sub').textContent=(labels[rating]||rating)+' · 추가 기록은 빠른 기록 앱에서';
}

let _selectedRating=null;

function selectRating(rating){
  _selectedRating=rating;
  // 선택된 버튼 강조, 나머지 흐리게
  ['better','same','worse'].forEach(r=>{
    const btn=document.getElementById('sel-'+r);
    if(!btn) return;
    btn.style.opacity=r===rating?'1':'0.35';
    btn.style.transform=r===rating?'scale(1.03)':'scale(0.97)';
  });
  document.getElementById('confirm-text').textContent=labels[rating]+' 선택됨';
  document.getElementById('confirm-bar').style.display='';
}

function cancelSelect(){
  _selectedRating=null;
  ['better','same','worse'].forEach(r=>{
    const btn=document.getElementById('sel-'+r);
    if(btn){btn.style.opacity='1';btn.style.transform='';}
  });
  document.getElementById('confirm-bar').style.display='none';
}

async function confirmRate(){
  if(!_selectedRating) return;
  await saveRating(_selectedRating);
}

async function saveRating(rating){
  const {id}=parseHash();
  const logs=getLogs();
  let idx=-1;
  if(id) idx=logs.findIndex(l=>String(l.id)===String(id));
  if(idx<0){
    for(let i=logs.length-1;i>=0;i--){
      if(logs[i]._type==='config') continue;
      if(!logs[i].outcome||(logs[i].outcome&&_isChanging)){idx=i;break;}
    }
  }
  // 변경 모드: 이미 outcome 있는 기록도 허용
  if(idx<0&&id){
    idx=logs.findIndex(l=>String(l.id)===String(id));
  }
  if(idx<0){
    document.getElementById('buttons').style.display='none';
    document.getElementById('confirm-bar').style.display='none';
    document.getElementById('error').textContent='⚠️ 평가할 기록을 찾을 수 없습니다';
    document.getElementById('error').style.display='';
    return;
  }

  const now=new Date(Date.now()+9*3600000).toISOString();
  logs[idx].outcome={rating:rating,ratedAt:now};
  saveLogs(logs);
  await syncToCloud(logs[idx]);

  document.getElementById('buttons').style.display='none';
  document.getElementById('confirm-bar').style.display='none';
  document.getElementById('sub-text').style.display='none';
  document.getElementById('already').style.display='none';
  document.getElementById('done').style.display='';
  document.getElementById('done-text').textContent=labels[rating]+' 저장 완료!';
  const dt=logs[idx].datetime||'';
  document.getElementById('done-sub').textContent=dt.slice(0,10)+' '+dt.slice(11,16)+' 두통의 경과';
}

let _isChanging=false;
function showChangeUI(){
  _isChanging=true;
  document.getElementById('already').style.display='none';
  document.getElementById('buttons').style.display='';
  document.getElementById('sub-text').textContent='경과를 변경할까요?';
  document.getElementById('sub-text').style.display='';
}

async function syncToCloud(entry){
  try{
    const url=localStorage.getItem('om_quick_sync_url')||'https://script.google.com/macros/s/AKfycbzYF46qeLJRGIQsqfXbic6ITRGKr1eA9chrVJ8Fu5_gM7TDSYUFlpaWQGmSR9RdAACjzw/exec';
    await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'save',entries:[entry]}),redirect:'follow'});
  }catch(e){}
}

// 초기화
const {rating,id}=parseHash();
const entry=findEntry(id);

if(entry){
  showEntryInfo(entry);
  if(entry.outcome){
    showAlreadyRated(entry);
  } else if(rating){
    // URL에 rating 포함 → 알림 버튼에서 직접 온 경우 → 선택 상태로 표시 (확인 필요)
    selectRating(rating);
  }
} else {
  document.getElementById('buttons').style.display='none';
  document.getElementById('error').textContent='평가할 두통 기록이 없습니다';
  document.getElementById('error').style.display='';
}
</script>
</body>
</html>
