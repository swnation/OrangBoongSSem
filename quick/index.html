<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c96442">
<title>🧠 두통 빠른 기록</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f0eb;--sf:#fff;--sf2:#f9f7f4;
  --bd:#e0dbd2;--bd2:#d0c9be;
  --ink:#1a1917;--mu:#7a7672;--mu2:#a09b96;
  --ac:#c96442;--gr:#2d6a4f;--re:#c03030;
  --font:'IBM Plex Sans KR',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1118;--sf:#1a1d28;--sf2:#22262f;
    --bd:#2a2e3a;--bd2:#353a48;
    --ink:#e4e2dd;--mu:#8a8682;--mu2:#5a5854;
    --ac:#e07a55;--gr:#4a9a7a;--re:#e05050;
  }
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px}
.app{height:100%;display:flex;flex-direction:column;overflow:hidden;max-width:500px;margin:0 auto}
.header{background:var(--sf);border-bottom:1.5px solid var(--bd);padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-icon{font-size:1.3rem}
.header-title{font-size:.95rem;font-weight:600;flex:1}
.header-count{font-size:.7rem;font-family:var(--mono);background:var(--ac);color:#fff;padding:2px 8px;border-radius:10px}
.tabs{display:flex;border-bottom:1.5px solid var(--bd);background:var(--sf);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--mu);font-family:var(--font);transition:all .15s;border-bottom:2px solid transparent}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* Form */
.section{margin-bottom:16px}
.section-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.row{display:flex;gap:8px;align-items:center}
.input{border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:.85rem;outline:none;background:var(--sf);color:var(--ink);width:100%}
.input:focus{border-color:var(--ac)}
.input-sm{width:auto;flex:1}

/* NRS */
.nrs-wrap{display:flex;align-items:center;gap:12px}
.nrs-wrap input[type=range]{flex:1;accent-color:var(--re);height:28px}
.nrs-val{font-size:1.5rem;font-weight:700;min-width:32px;text-align:center}
.nrs-skip{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--mu);margin-top:4px}
.nrs-skip input{accent-color:var(--ac)}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);font-size:.82rem;cursor:pointer;transition:all .15s;user-select:none;background:var(--sf2);-webkit-tap-highlight-color:transparent}
.chip:active{transform:scale(.96)}
.chip.sel{font-weight:600;color:#fff}
.chip.sel-left{background:#3b82f6;border-color:#3b82f6}
.chip.sel-right{background:#ef4444;border-color:#ef4444}
.chip.sel-sym{background:#8b5cf6;border-color:#8b5cf6}
.chip.sel-med{background:#f59e0b;border-color:#f59e0b;color:var(--ink)}
.chip.sel-tx{background:#10b981;border-color:#10b981}
.chip.sel-trigger{background:#92400e;border-color:#92400e}
.chip.sel-pain{background:#ec4899;border-color:#ec4899}
.other-row{display:flex;gap:6px;margin-top:6px}
.other-input{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:6px 10px;font-family:var(--font);font-size:.8rem;outline:none;background:var(--sf);color:var(--ink)}
.other-input:focus{border-color:var(--ac)}
.btn-other-add{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}

.memo{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:.85rem;resize:none;outline:none;background:var(--sf2);color:var(--ink);min-height:60px}
.memo:focus{border-color:var(--ac)}

.btn-save{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .2s;margin-top:8px}
.btn-save:active{transform:scale(.98);background:#a8522e}

/* List */
.log-item{background:var(--sf);border:1.5px solid var(--bd);border-radius:9px;padding:12px 14px;margin-bottom:8px}
.log-item-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.log-item-date{font-size:.72rem;font-family:var(--mono);color:var(--mu2)}
.log-item-nrs{font-size:.78rem;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff}
.log-item-badge{font-size:.6rem;font-family:var(--mono);padding:2px 6px;border-radius:3px;margin-left:auto}
.log-item-badge.pending{background:#fff7ed;color:#c2410c}
.log-item-badge.synced{background:#f0fdf4;color:#15803d}
.log-item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.log-tag{font-size:.68rem;padding:2px 7px;border-radius:3px}
.log-tag-site{background:#eff6ff;color:#1d4ed8}
.log-tag-sym{background:#faf5ff;color:#7c3aed}
.log-tag-med{background:#fffbeb;color:#b45309}
.log-tag-tx{background:#f0fdf4;color:#15803d}
.log-tag-pain{background:#fce7f3;color:#9d174d}
.log-item-memo{font-size:.8rem;color:var(--mu);line-height:1.5;margin-top:4px}
.log-item-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:.72rem;cursor:pointer;color:var(--mu);font-family:var(--font)}
.btn-sm:hover{border-color:var(--ac);color:var(--ac)}
.btn-sm.del:hover{border-color:var(--re);color:var(--re)}

.empty{text-align:center;color:var(--mu2);font-size:.85rem;padding:40px 20px;line-height:1.7}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:.82rem;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(prefers-color-scheme:dark){
  .log-item-badge.pending{background:#2a1a0a;color:#fb923c}
  .log-item-badge.synced{background:#0d2a1a;color:#4ade80}
  .log-tag-site{background:#1a2540;color:#60a5fa}
  .log-tag-sym{background:#1a0d2a;color:#a78bfa}
  .log-tag-med{background:#2a1a0a;color:#fbbf24}
  .log-tag-tx{background:#0d2a1a;color:#4ade80}
  .log-tag-pain{background:#2a0d1a;color:#f9a8d4}
}
/* Settings panel */
.settings-panel{display:none;padding:16px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;margin:16px}
.settings-panel.show{display:block}
.settings-label{font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:4px}
.settings-input{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:.8rem;outline:none;background:var(--sf);color:var(--ink)}
.settings-input:focus{border-color:var(--ac)}
.settings-note{font-size:.68rem;color:var(--mu2);margin-top:4px;line-height:1.5}
.sync-status{font-size:.68rem;font-family:var(--font);padding:3px 8px;border-radius:4px;display:inline-block;margin-top:6px}
.sync-ok{background:#f0fdf4;color:#15803d}
.sync-fail{background:#fff0f0;color:#c03030}
.sync-ing{background:#eff6ff;color:#1d4ed8}
.btn-gear{background:none;border:none;font-size:1rem;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-icon">🧠</span>
    <span class="header-title">두통 빠른 기록</span>
    <span class="header-count" id="pending-count" style="display:none"></span>
    <button class="btn-gear" onclick="toggleSettings()">⚙️</button>
  </div>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-label">클라우드 동기화 URL</div>
    <input class="settings-input" id="sync-url-input" placeholder="Google Apps Script 배포 URL 붙여넣기"
      onchange="saveSyncUrl(this.value)">
    <div class="settings-note">기록 저장 시 클라우드에 자동 업로드됩니다. 다른 기기에서도 확인 가능.</div>
    <div id="sync-indicator" style="font-size:.7rem;margin-top:4px"></div>
    <div id="sync-status"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn-sm" onclick="testSyncUrl()">연결 테스트</button>
      <button class="btn-sm" onclick="syncAllToCloud()">전체 업로드</button>
    </div>
    <div style="border-top:1px solid var(--bd);margin-top:12px;padding-top:12px">
      <div class="settings-label">🔔 ntfy 알림 토픽</div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <div style="flex:1">
          <div style="font-size:.62rem;color:var(--mu2);margin-bottom:2px">붕쌤 (즉시 알림)</div>
          <input class="settings-input" id="ntfy-bung-input" placeholder="붕쌤 ntfy 토픽"
            onchange="localStorage.setItem('om_ntfy_bung',this.value.trim());syncNtfyConfig()">
        </div>
        <div style="flex:1">
          <div style="font-size:.62rem;color:var(--mu2);margin-bottom:2px">오랑이 (경과 알림)</div>
          <input class="settings-input" id="ntfy-orangi-input" placeholder="오랑이 ntfy 토픽"
            onchange="localStorage.setItem('om_ntfy_orangi',this.value.trim());syncNtfyConfig()">
        </div>
      </div>
      <div class="settings-note">기록 저장 시 붕쌤에게 즉시 알림, 오랑이에게 경과 확인 알림을 보냅니다.</div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
        <span style="font-size:.72rem;color:var(--mu)">기본 경과 알림:</span>
        <input type="number" class="settings-input" id="ntfy-delay-input" style="width:60px;text-align:center" min="10" max="480" value="120"
          onchange="localStorage.setItem('om_outcome_delay',this.value);syncNtfyConfig()">
        <span style="font-size:.72rem;color:var(--mu)">분 후</span>
      </div>
      <div style="margin-top:6px;display:flex;align-items:center;gap:6px">
        <span style="font-size:.72rem;color:var(--mu)">💊 약물 복용 알림:</span>
        <select id="ntfy-med-delay-input" class="settings-input" style="width:80px;text-align:center"
          onchange="localStorage.setItem('om_med_reminder_delay',this.value);syncNtfyConfig()">
          <option value="0">끄기</option>
          <option value="15">15분</option>
          <option value="30">30분</option>
          <option value="60">1시간</option>
          <option value="90">1시간30분</option>
          <option value="120">2시간</option>
        </select>
        <span style="font-size:.68rem;color:var(--mu2)">약 미입력 시</span>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('form')">✏️ 기록</button>
    <button class="tab" onclick="switchTab('outcome')">🩺 경과</button>
    <button class="tab" onclick="switchTab('list')">📋 목록</button>
  </div>
  <div class="body" id="tab-form">
    <!-- form is rendered by JS -->
  </div>
  <div class="body" id="tab-outcome" style="display:none">
  </div>
  <div class="body" id="tab-list" style="display:none">
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ── Config (matches orangi-migraine logConfig) ──
const SITES = {
  left: ['미간','이마','눈썹부위','관자놀이','후두부'],
  right: ['미간','이마','눈썹부위','관자놀이','후두부']
};
const SYMPTOMS = ['구역','어지러움','손발저림','빛과민','소리과민','식은땀','심계항진','실신전조'];
const PAIN_TYPES = ['욱신거림','쥐어짜는','찌르는','묵직한','쑤시는','타는 듯한','전기 오는 듯한'];
const MEDS = ['AAP 500mg','Loxoprofen','타 NSAID','Metoclopramide'];
const TREATMENTS = ['GON block','LON block','SPG block'];
const TRIGGERS = ['수면부족','과수면','수면분절','공복','불규칙식사','카페인','알코올','스트레스','피로','강한빛','소음','냄새','운동후','긴장/자세','생리전후','날씨변화'];

const LS_KEY = 'om_quick_logs';

// ── 커스텀 칩 영구 저장 (메인 앱과 키 공유 → Drive 동기화) ──
const _QC_KEY_MAP={
  'med':'om_custom_meds_orangi-migraine','sym':'om_custom_syms_orangi-migraine',
  'tx':'om_custom_tx_orangi-migraine','pain':'om_custom_pain_orangi-migraine',
  'trigger':'om_custom_triggers_orangi-migraine',
  'site-left':'om_custom_sites_left_orangi-migraine','site-right':'om_custom_sites_right_orangi-migraine'
};
function getCustom(key) {
  const mk=_QC_KEY_MAP[key];
  // 메인 앱 키에서 먼저 읽고, 없으면 구 키(om_qc_)도 병합
  try {
    const main=mk?JSON.parse(localStorage.getItem(mk)||'[]'):[];
    const old=JSON.parse(localStorage.getItem('om_qc_'+key)||'[]');
    if(old.length&&mk) { const merged=[...new Set([...main,...old])]; localStorage.setItem(mk,JSON.stringify(merged)); localStorage.removeItem('om_qc_'+key); return merged; }
    return main.length?main:old;
  } catch { return []; }
}
function saveCustom(key, arr) {
  const mk=_QC_KEY_MAP[key];
  if(mk) localStorage.setItem(mk, JSON.stringify(arr));
  else localStorage.setItem('om_qc_'+key, JSON.stringify(arr));
  // 클라우드에도 커스텀 항목 동기화
  syncCustomsToCloud();
}
function getAllCustoms() {
  const result={};
  Object.keys(_QC_KEY_MAP).forEach(k=>{result[k]=getCustom(k);});
  // ntfy 토픽도 포함 (기기간 공유)
  const nb=localStorage.getItem('om_ntfy_bung');if(nb) result._ntfy_bung=nb;
  const no=localStorage.getItem('om_ntfy_orangi');if(no) result._ntfy_orangi=no;
  return result;
}
function setAllCustoms(obj) {
  if(!obj) return;
  // ntfy 토픽 복원
  if(obj._ntfy_bung&&!localStorage.getItem('om_ntfy_bung')) localStorage.setItem('om_ntfy_bung',obj._ntfy_bung);
  if(obj._ntfy_orangi&&!localStorage.getItem('om_ntfy_orangi')) localStorage.setItem('om_ntfy_orangi',obj._ntfy_orangi);
  // 커스텀 칩 복원
  Object.entries(obj).forEach(([k,arr])=>{
    if(k.startsWith('_')) return; // skip settings keys
    if(!Array.isArray(arr)||!arr.length) return;
    const existing=getCustom(k);
    const merged=[...new Set([...existing,...arr])];
    const mk=_QC_KEY_MAP[k];
    if(mk) localStorage.setItem(mk, JSON.stringify(merged));
    else localStorage.setItem('om_qc_'+k, JSON.stringify(merged));
  });
}
let _customSyncTimer=null;
function syncCustomsToCloud() {
  clearTimeout(_customSyncTimer);
  _customSyncTimer=setTimeout(async()=>{
    const url=getSyncUrl();if(!url) return;
    try{await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveCustoms',customs:getAllCustoms()}),redirect:'follow'});}catch(e){}
  },500);
}

// ── 설정(ntfy 등)을 quickLogs 안에 특수 항목으로 저장 → 기존 클라우드 동기화로 기기간 공유 ──
const _CONFIG_ID='_quick_config';
function getQuickConfig(){
  const logs=getQuickLogs();
  return logs.find(l=>l.id===_CONFIG_ID)||{};
}
function saveQuickConfig(cfg){
  const logs=getQuickLogs();
  const idx=logs.findIndex(l=>l.id===_CONFIG_ID);
  const entry={...cfg,id:_CONFIG_ID,_type:'config'};
  if(idx>=0) logs[idx]=entry; else logs.push(entry);
  saveQuickLogs(logs);
  return entry;
}
function applyQuickConfig(){
  const cfg=getQuickConfig();
  // 클라우드 → localStorage 복원 (클라우드가 진실)
  if(cfg.ntfy_bung) localStorage.setItem('om_ntfy_bung',cfg.ntfy_bung);
  if(cfg.ntfy_orangi) localStorage.setItem('om_ntfy_orangi',cfg.ntfy_orangi);
  if(cfg.outcome_delay) localStorage.setItem('om_outcome_delay',cfg.outcome_delay);
  if(cfg.med_reminder_delay!==undefined) localStorage.setItem('om_med_reminder_delay',String(cfg.med_reminder_delay));
}
function syncNtfyConfig(){
  const nb=localStorage.getItem('om_ntfy_bung')||'';
  const no=localStorage.getItem('om_ntfy_orangi')||'';
  const od=localStorage.getItem('om_outcome_delay')||'120';
  const md=localStorage.getItem('om_med_reminder_delay')||'30';
  const entry=saveQuickConfig({ntfy_bung:nb,ntfy_orangi:no,outcome_delay:od,med_reminder_delay:md});
  cloudSave([entry]);
}

// ── Helpers ──
function kstNow() {
  const d = new Date(Date.now() + 9*3600000);
  return { date: d.toISOString().slice(0,10), time: d.toISOString().slice(11,16) };
}

// 날씨 자동 수집 (메인앱과 동일)
async function fetchWeather(){
  const key=localStorage.getItem('om_weather_key')||'';
  if(!key) return null;
  try{
    const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=37.5326&lon=127.1378&appid=${key}&units=metric&lang=kr`,{signal:AbortSignal.timeout(2000)});
    if(!r.ok) return null;
    const d=await r.json();
    return{temp:Math.round(d.main.temp*10)/10,humidity:d.main.humidity,pressure:d.main.pressure,condition:d.weather?.[0]?.description||''};
  }catch(e){return null;}
}

// ── 편두통 일기예보 (메인앱 renderMigraineForecast 포팅) ──
function renderQuickForecast() {
  const logs = getQuickEntries();
  const nrsLogs = logs.filter(l => l.nrs >= 0 && l.datetime);
  if (nrsLogs.length < 14) return ''; // 최소 2주 데이터

  const now = kstNow();
  const today = now.date;
  const d = new Date(Date.now() + 9*3600000);
  const dow = d.getUTCDay();
  const factors = [];
  const details = [];
  let riskScore = 0;
  const allAvg = nrsLogs.reduce((s,l) => s + l.nrs, 0) / nrsLogs.length;
  const dowName = ['일','월','화','수','목','금','토'][dow];

  // 1) 요일 패턴
  const sameDow = nrsLogs.filter(l => {
    const ld = new Date(l.datetime.slice(0,10) + 'T00:00:00Z');
    return ld.getUTCDay() === dow;
  });
  if (sameDow.length >= 3) {
    const avg = sameDow.reduce((s,l) => s + l.nrs, 0) / sameDow.length;
    if (avg > allAvg + 1) { riskScore += 20; factors.push(`📅 ${dowName}요일 평균 NRS ${avg.toFixed(1)} (전체 ${allAvg.toFixed(1)})`);
      details.push({title:'📅 요일 패턴',score:20,desc:`${dowName}요일 ${sameDow.length}건의 평균 NRS ${avg.toFixed(1)}로, 전체 평균 ${allAvg.toFixed(1)}보다 ${(avg-allAvg).toFixed(1)} 높습니다.`}); }
    else if (avg > allAvg) { riskScore += 8; details.push({title:'📅 요일 패턴',score:8,desc:`${dowName}요일 평균 NRS ${avg.toFixed(1)}로 전체 평균(${allAvg.toFixed(1)})보다 약간 높으나 유의미한 차이는 아닙니다.`}); }
  }

  // 2) 최근 3일 패턴
  const recent3 = nrsLogs.filter(l => {
    const ld = l.datetime.slice(0,10);
    const diff = Math.round((new Date(today+'T00:00:00') - new Date(ld+'T00:00:00')) / 86400000);
    return diff >= 0 && diff <= 3;
  });
  if (recent3.length) {
    const avg3 = recent3.reduce((s,l) => s + l.nrs, 0) / recent3.length;
    const r3Dates = recent3.map(l=>l.datetime.slice(5,10)+':NRS'+l.nrs).join(', ');
    if (avg3 >= 6) { riskScore += 25; factors.push(`🔥 최근 3일 평균 NRS ${avg3.toFixed(1)} — 고통 지속 중`);
      details.push({title:'🔥 최근 3일 추세',score:25,desc:`최근 3일간 ${recent3.length}건의 평균 NRS ${avg3.toFixed(1)}. 연속 고통은 다음날에도 이어질 가능성 높음.\n${r3Dates}`}); }
    else if (avg3 >= 4) { riskScore += 12; factors.push(`⚠️ 최근 3일 평균 NRS ${avg3.toFixed(1)}`);
      details.push({title:'⚠️ 최근 3일 추세',score:12,desc:`최근 3일 평균 NRS ${avg3.toFixed(1)}로 중간 수준 통증 지속.\n${r3Dates}`}); }
  }

  // 3) 최근 7일 트리거
  const recent7 = nrsLogs.filter(l => {
    const ld = l.datetime.slice(0,10);
    const diff = Math.round((new Date(today+'T00:00:00') - new Date(ld+'T00:00:00')) / 86400000);
    return diff >= 0 && diff <= 7;
  });
  const activeTriggers = new Set(recent7.flatMap(l => l.triggers || []));
  const highRiskTriggers = ['수면부족','수면분절','스트레스','생리전후','피로'];
  const activeHigh = highRiskTriggers.filter(t => activeTriggers.has(t));
  if (activeHigh.length >= 2) { riskScore += 20; factors.push(`⚡ 고위험 트리거 활성: ${activeHigh.join(', ')}`);
    details.push({title:'⚡ 고위험 트리거',score:20,desc:`최근 7일 기록에서 고위험 트리거 ${activeHigh.length}개 활성: ${activeHigh.join(', ')}`}); }
  else if (activeHigh.length === 1) { riskScore += 10; factors.push(`⚡ 트리거 활성: ${activeHigh[0]}`);
    details.push({title:'⚡ 트리거',score:10,desc:`최근 7일 기록에서 '${activeHigh[0]}' 트리거 활성.`}); }

  // 4) 날씨 (저기압)
  const withWeather = [...nrsLogs].reverse().find(l => l.weather?.pressure);
  const cachedP = withWeather?.weather?.pressure;
  if (cachedP) {
    if (cachedP < 1005) { riskScore += 20; factors.push(`🌧 저기압 ${cachedP}hPa (기압 민감)`);
      details.push({title:'🌧 저기압',score:20,desc:`기압 ${cachedP}hPa로 매우 낮음 (기준: 1013hPa). 저기압은 혈관 확장→편두통 악화 가능.`}); }
    else if (cachedP < 1010) { riskScore += 10; factors.push(`☁️ 기압 ${cachedP}hPa (약간 낮음)`);
      details.push({title:'☁️ 기압',score:10,desc:`기압 ${cachedP}hPa로 약간 낮음. 기압 민감 시 소폭 위험 상승.`}); }
  }

  // 실시간 날씨 비동기 업데이트
  if (window._qForecastTimer) clearTimeout(window._qForecastTimer);
  window._qForecastTimer = setTimeout(async () => {
    try {
      const w = await Promise.race([fetchWeather(), new Promise(r => setTimeout(() => r(null), 3000))]);
      if (!w?.pressure) return;
      const el = document.getElementById('quick-forecast-weather');
      if (el) el.innerHTML = `🌡 현재 ${w.temp}° ${w.condition} ${w.pressure}hPa ${w.humidity}%`;
    } catch(e) {}
  }, 100);

  // 점수 정규화 (0~100)
  riskScore = Math.min(100, riskScore);

  // 위험도 레벨 (다크모드 대응)
  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches;
  let level, emoji, color, bg;
  if (riskScore >= 60) { level='높음'; emoji='🌩️'; color='#ef4444'; bg=isDark?'linear-gradient(135deg,#2a1010,#3a1515)':'linear-gradient(135deg,#fef2f2,#fee2e2)'; }
  else if (riskScore >= 35) { level='보통'; emoji='⛅'; color=isDark?'#fbbf24':'#f59e0b'; bg=isDark?'linear-gradient(135deg,#2a2010,#3a2a15)':'linear-gradient(135deg,#fffbeb,#fef3c7)'; }
  else { level='낮음'; emoji='☀️'; color='#10b981'; bg=isDark?'linear-gradient(135deg,#0d2a1a,#153a20)':'linear-gradient(135deg,#f0fdf4,#dcfce7)'; }

  const factorHtml = factors.length
    ? factors.map(f => `<div style="font-size:.7rem;color:var(--mu);padding:2px 0">• ${f}</div>`).join('')
    : '<div style="font-size:.7rem;color:var(--mu2)">특별한 위험 요인 없음</div>';

  const gauge = `<div style="position:relative;height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin:8px 0">
    <div style="width:${riskScore}%;height:100%;background:${color};border-radius:4px;transition:width .5s"></div>
  </div>`;

  // 상세 근거 (접기/펼치기)
  let detailHtml = '';
  if (details.length) {
    detailHtml = `<div id="qf-detail" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid ${color}30">
      <div style="font-size:.65rem;color:var(--mu);margin-bottom:6px">분석 데이터: ${nrsLogs.length}건 · 전체 평균 NRS: ${allAvg.toFixed(1)}</div>
      ${details.map(dd => `<div style="padding:6px 8px;margin-bottom:4px;background:var(--sf);border-radius:6px;border-left:3px solid ${dd.score>=20?'#ef4444':dd.score>=10?'#f59e0b':'#10b981'}">
        <div style="display:flex;justify-content:space-between"><span style="font-size:.72rem;font-weight:600">${dd.title}</span><span style="font-size:.65rem;font-weight:700;color:${dd.score>=20?'#ef4444':dd.score>=10?'#f59e0b':'#10b981'}">+${dd.score}점</span></div>
        <div style="font-size:.65rem;color:var(--mu);line-height:1.5;margin-top:2px;white-space:pre-line">${esc(dd.desc)}</div>
      </div>`).join('')}
      <div style="font-size:.58rem;color:var(--mu2);line-height:1.5;margin-top:6px;padding:6px;background:var(--sf);border-radius:4px"><b>산출 기준</b>: 요일패턴(+20) · 3일추세(+25) · 고위험트리거(+20) · 저기압(+20) · 생리주기(+15)</div>
    </div>`;
  }

  return `<div style="background:${bg};border:1.5px solid ${color}30;border-radius:12px;padding:14px;margin-bottom:16px;cursor:pointer" onclick="var d=document.getElementById('qf-detail');if(d)d.style.display=d.style.display==='none'?'block':'none'">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:1.8rem">${emoji}</span>
      <div>
        <div style="font-size:.82rem;font-weight:700;color:${color}">오늘의 편두통 일기예보</div>
        <div style="font-size:.68rem;color:var(--mu)">위험도 <b>${riskScore}점</b> · ${level}</div>
      </div>
      <span style="margin-left:auto;font-size:.55rem;color:var(--mu2)">탭→근거</span>
    </div>
    ${gauge}
    ${factorHtml}
    <div id="quick-forecast-weather" style="font-size:.65rem;color:var(--mu2);margin-top:6px"></div>
    ${detailHtml}
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getQuickLogs() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch { return []; }
}
// 기록만 반환 (설정 항목 제외)
function getQuickEntries() {
  return getQuickLogs().filter(l=>l._type!=='config');
}

// v9.0 부위명 마이그레이션
(function migrateSiteNames(){
  if(localStorage.getItem('om_site_migrated')) return;
  const logs=getQuickLogs();
  const renames={'미간':'이마','눈썹위':'눈썹부위'};
  let changed=false;
  logs.forEach(l=>{
    if(!l.sites?.length) return;
    l.sites=l.sites.map(s=>{
      for(const [from,to] of Object.entries(renames)){
        if(s.includes(from)){changed=true;return s.replace(from,to);}
      }
      return s;
    });
  });
  if(changed) localStorage.setItem(LS_KEY,JSON.stringify(logs));
  localStorage.setItem('om_site_migrated','1');
})();

// 커스텀 항목 자동 복구: 기록에 쓰인 항목 중 기본 목록에 없는 것을 커스텀에 추가
// (기기 변경, 캐시 삭제, iOS 7일 정책 등으로 커스텀 목록 유실 시 자동 복원)
(function recoverCustomsFromLogs(){
  const logs=getQuickLogs();
  if(!logs.length) return;
  const sets={med:new Set(MEDS),sym:new Set(SYMPTOMS),tx:new Set(TREATMENTS),pain:new Set(PAIN_TYPES),trigger:new Set(TRIGGERS)};
  const siteL=new Set(SITES.left||[]),siteR=new Set(SITES.right||[]);
  const found={med:new Set(),sym:new Set(),tx:new Set(),pain:new Set(),trigger:new Set(),'site-left':new Set(),'site-right':new Set()};
  logs.forEach(l=>{
    (l.meds||[]).forEach(v=>{if(!sets.med.has(v))found.med.add(v);});
    (l.symptoms||[]).forEach(v=>{if(!sets.sym.has(v))found.sym.add(v);});
    (l.treatments||[]).forEach(v=>{if(!sets.tx.has(v))found.tx.add(v);});
    (l.painType||[]).forEach(v=>{if(!sets.pain.has(v))found.pain.add(v);});
    (l.triggers||[]).forEach(v=>{if(!sets.trigger.has(v))found.trigger.add(v);});
    (l.sites||[]).forEach(s=>{
      const m=s.match(/^(왼쪽|오른쪽)\s+(.+)$/);
      if(!m) return;
      const side=m[1]==='왼쪽'?'left':'right';
      const name=m[2];
      if(side==='left'&&!siteL.has(name)) found['site-left'].add(name);
      if(side==='right'&&!siteR.has(name)) found['site-right'].add(name);
    });
  });
  Object.entries(found).forEach(([key,vals])=>{
    if(!vals.size) return;
    const customs=getCustom(key);
    let changed=false;
    vals.forEach(v=>{if(!customs.includes(v)){customs.push(v);changed=true;}});
    if(changed) saveCustom(key,customs);
  });
})();

function saveQuickLogs(logs) {
  localStorage.setItem(LS_KEY, JSON.stringify(logs));
  updatePendingCount();
}

function nrsColor(n) {
  if (n <= 3) return '#2d8a5a';
  if (n <= 6) return '#e67e22';
  return '#c03030';
}

function showToast(msg, dur) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), dur || 2500);
}

function updatePendingCount() {
  const logs = getQuickEntries();
  const pending = logs.filter(l => !l.synced).length;
  const el = document.getElementById('pending-count');
  if (pending > 0) {
    el.textContent = pending + '건 미반영';
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='form'&&i===0)||(tab==='outcome'&&i===1)||(tab==='list'&&i===2));
  });
  document.getElementById('tab-form').style.display = tab==='form' ? '' : 'none';
  document.getElementById('tab-outcome').style.display = tab==='outcome' ? '' : 'none';
  document.getElementById('tab-list').style.display = tab==='list' ? '' : 'none';
  if (tab==='list') renderList();
  if (tab==='outcome') renderOutcomeTab();
}

// ── Chip toggle ──
function toggleChip(el, cls) {
  el.classList.toggle('sel');
  el.classList.toggle(cls, el.classList.contains('sel'));
  // Sync head diagram if it's a site chip
  if(el.dataset.side) syncHeadDiagram();
}

function addOtherChip(inputId, containerId, group, cls) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  const container = document.getElementById(containerId);
  const chip = document.createElement('span');
  chip.className = 'chip sel ' + cls;
  chip.dataset.val = val;
  chip.dataset.group = group;
  chip.textContent = val;
  chip.onclick = function() { toggleChip(this, cls); };
  container.appendChild(chip);
  input.value = '';
  // 커스텀 칩 영구 저장
  const customs = getCustom(group);
  if (!customs.includes(val)) { customs.push(val); saveCustom(group, customs); }
}

const _SIDE_COLORS = {left:{rgb:'59,130,246',hex:'#3b82f6'},right:{rgb:'239,68,68',hex:'#ef4444'},both:{rgb:'168,85,247',hex:'#a855f7'}};
const _FRONT_REGIONS = [

];

  {id:'l-occipital', shape:'ellipse', cx:195,cy:330,rx:100,ry:95, side:'left', site:'후두부', op:'.10', labels:[{x:195,y:336,fs:24,fw:700,t:'후두부'}]},

];
const _SIDE_LABELS = {
  front:[{x:150,y:490,side:'left',t:'← 왼쪽'},{x:450,y:490,side:'right',t:'오른쪽 →'}],
  back:[{x:195,y:490,side:'left',t:'← 왼쪽'},{x:405,y:490,side:'right',t:'오른쪽 →'}],
};

function _buildRegionSVG(regions, sideLabels, prefix, toggleFn) {
  var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var labelStroke = isDark ? 'rgba(255,255,255,.4)' : 'rgba(0,0,0,.25)';
  var parts = regions.map(function(r) {
    var c = _SIDE_COLORS[r.side];
    var sw = r.sw || 2.5;
    var dash = r.dash ? ' stroke-dasharray="6,3"' : '';
    var shape;
    if (r.shape === 'ellipse') {
      shape = '<ellipse id="'+prefix+r.id+'" cx="'+r.cx+'" cy="'+r.cy+'" rx="'+r.rx+'" ry="'+r.ry+'" fill="rgba('+c.rgb+','+r.op+')" stroke="'+c.hex+'" stroke-width="'+sw+'"'+dash+' style="cursor:pointer" onclick="'+toggleFn+"('"+r.side+"','"+r.site+"')\""+'/>';
    } else {
      shape = '<rect id="'+prefix+r.id+'" x="'+r.x+'" y="'+r.y+'" width="'+r.w+'" height="'+r.h+'" rx="'+r.rx+'" fill="rgba('+c.rgb+','+r.op+')" stroke="'+c.hex+'" stroke-width="'+sw+'"'+dash+' style="cursor:pointer" onclick="'+toggleFn+"('"+r.side+"','"+r.site+"')\""+'/>';
    }
    var labels = r.labels.map(function(l) {
      return '<text x="'+l.x+'" y="'+l.y+'" text-anchor="middle" font-size="'+l.fs+'" font-weight="'+l.fw+'" fill="'+c.hex+'" stroke="'+labelStroke+'" stroke-width="3" paint-order="stroke" style="pointer-events:none">'+l.t+'</text>';
    }).join('\n          ');
    return '          '+shape+'\n          '+labels;
  });
  sideLabels.forEach(function(sl) {
    var c = _SIDE_COLORS[sl.side];
    parts.push('          <text x="'+sl.x+'" y="'+sl.y+'" text-anchor="middle" font-size="16" fill="'+c.hex+'" font-weight="600" opacity=".8">'+sl.t+'</text>');
  });
  return parts.join('\n');
}

var _headView = 'front';
function getHeadSVG(prefix) {
  var showFront = _headView === 'front';
  var regions = showFront ? _FRONT_REGIONS : _BACK_REGIONS;
  var sLabels = showFront ? _SIDE_LABELS.front : _SIDE_LABELS.back;
  var imgSrc = showFront ? '../icons/head-front.png' : '../icons/head-back.png';
  var imgAlt = showFront ? '정면' : '후면';
  return `
  <div style="text-align:center;padding:6px 0">
    <div style="display:flex;justify-content:center;gap:4px;margin-bottom:6px">
      <button onclick="_headView='front';renderHeadDiagram();syncHeadDiagram()" style="padding:4px 14px;border-radius:6px;border:1.5px solid ${showFront?'var(--ac)':'var(--bd)'};background:${showFront?'var(--ac)':'none'};color:${showFront?'#fff':'var(--mu)'};font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit">정면</button>
      <button onclick="_headView='back';renderHeadDiagram();syncHeadDiagram()" style="padding:4px 14px;border-radius:6px;border:1.5px solid ${!showFront?'var(--ac)':'var(--bd)'};background:${!showFront?'var(--ac)':'none'};color:${!showFront?'#fff':'var(--mu)'};font-size:.7rem;font-weight:600;cursor:pointer;font-family:inherit">후면</button>
    </div>
    <div style="position:relative;display:inline-block;width:340px;max-width:85vw">
        <img src="${imgSrc}" alt="${imgAlt}" style="width:100%;border-radius:10px;pointer-events:none">
        <svg viewBox="0 0 600 500" style="position:absolute;top:0;left:0;width:100%;height:100%">
${_buildRegionSVG(regions, sLabels, prefix, 'toggleHeadSite')}
        </svg>
    </div>
  </div>`;
}

function renderHeadDiagram() {
  const el=document.getElementById('head-diagram');
  if(!el) return;
  el.innerHTML=getHeadSVG('hd-');
}

const _hdMap={
  'left-관자놀이':'hd-l-temple','left-눈썹부위':'hd-l-brow','left-이마':'hd-l-forehead','left-후두부':'hd-l-occipital',
  'right-관자놀이':'hd-r-temple','right-눈썹부위':'hd-r-brow','right-이마':'hd-r-forehead','right-후두부':'hd-r-occipital',
  'both-미간':'hd-c-glabella'
};
function getHdMap(prefix) {
  const m={};
  Object.entries(_hdMap).forEach(([k,v])=>{ m[k]=v.replace('hd-',prefix); });
  return m;
}

function toggleHeadSite(side, site) {
  if(side==='both') {
    ['left','right'].forEach(s=>{
      const chip=document.querySelector(`#site-${s}-chips .chip[data-val="${site}"]`);
      if(chip) { chip.click(); }
    });
  } else {
    const chip=document.querySelector(`#site-${side}-chips .chip[data-val="${site}"]`);
    if(chip) chip.click();
  }
  // 후두부 칩 선택 시 자동으로 후면 전환
  if(site==='후두부' && _headView==='front') { _headView='back'; renderHeadDiagram(); }
  syncHeadDiagram();
}

function syncHeadDiagram() {
  const activeL=new Set();const activeR=new Set();
  document.querySelectorAll('#site-left-chips .chip.sel').forEach(c=>activeL.add(c.dataset.val));
  document.querySelectorAll('#site-right-chips .chip.sel').forEach(c=>activeR.add(c.dataset.val));

  Object.entries(_hdMap).forEach(([key,id])=>{
    const el=document.getElementById(id);if(!el) return;
    const [side,site]=key.split('-');
    let active=false;
    if(side==='both') active=activeL.has(site)||activeR.has(site);
    else if(side==='left') active=activeL.has(site);
    else active=activeR.has(site);

    const c=_SIDE_COLORS[side];
    el.setAttribute('fill',active?`rgba(${c.rgb},.45)`:`rgba(${c.rgb},.10)`);
    el.setAttribute('stroke',c.hex);
    el.setAttribute('stroke-width',active?'3.5':'2.5');
    el.style.filter=active?`drop-shadow(0 0 6px ${c.hex})`:'none';
  });
}

function addSiteChip(inputId, containerId, side) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  const container = document.getElementById(containerId);
  const chip = document.createElement('span');
  chip.className = 'chip sel sel-' + side;
  chip.dataset.val = val;
  chip.dataset.side = side;
  chip.textContent = val;
  chip.onclick = function() { toggleChip(this, 'sel-' + side); };
  container.appendChild(chip);
  input.value = '';
  const customs = getCustom('site-' + side);
  if (!customs.includes(val)) { customs.push(val); saveCustom('site-' + side, customs); }
}

// ── Save ──
async function saveEntry() {
  const date = document.getElementById('q-date').value;
  if (!date) { showToast('날짜를 선택하세요'); return; }
  const timeUnknown = document.getElementById('q-time-unknown').checked;
  const time = timeUnknown ? '시간미상' : (document.getElementById('q-time').value || '00:00');

  let nrs = -1;
  if (!document.getElementById('q-skip-nrs').checked) {
    nrs = parseInt(document.getElementById('q-nrs').value);
  }

  const sites = [];
  document.querySelectorAll('.chip.sel[data-side]').forEach(el =>
    sites.push((el.dataset.side==='left'?'왼쪽':'오른쪽')+' '+el.dataset.val)
  );
  const painType = [];
  document.querySelectorAll('.chip.sel[data-group="pain"]').forEach(el => painType.push(el.dataset.val));
  const symptoms = [];
  document.querySelectorAll('.chip.sel[data-group="sym"]').forEach(el => symptoms.push(el.dataset.val));
  const meds = [];
  document.querySelectorAll('.chip.sel[data-group="med"]').forEach(el => meds.push(el.dataset.val));
  const treatments = [];
  document.querySelectorAll('.chip.sel[data-group="tx"]').forEach(el => treatments.push(el.dataset.val));
  const triggers = [];
  document.querySelectorAll('.chip.sel[data-group="trigger"]').forEach(el => triggers.push(el.dataset.val));
  const memo = document.getElementById('q-memo')?.value.trim() || '';

  const editId = document.getElementById('q-edit-id')?.value;
  const logs = getQuickLogs();

  if (editId) {
    const idx = logs.findIndex(l => String(l.id) === editId);
    if (idx >= 0) {
      const updated = { ...logs[idx], datetime: `${date}T${time}`, nrs, sites, painType, symptoms, meds, treatments, triggers, memo, synced: false };
      logs[idx] = updated;
      saveQuickLogs(logs);
      showToast('💾 저장 중...');
      const ok = await cloudSave([updated]);
      showToast(ok ? '✅ 수정 완료 + ☁️ 업로드됨' : '✅ 수정 완료 (오프라인)');
      renderForm();
      return;
    }
  }

  const entry = {
    id: Date.now(),
    datetime: `${date}T${time}`,
    nrs, sites, painType, symptoms, meds, treatments, triggers, memo,
    synced: false,
    createdAt: new Date(Date.now() + 9*3600000).toISOString()
  };

  // 로컬 저장 먼저 (날씨 fetch 대기 중 데이터 유실 방지)
  logs.push(entry);
  saveQuickLogs(logs);
  showToast('💾 저장 중...');

  // 날씨 자동 첨부 (백그라운드)
  try{const w=await fetchWeather();if(w){entry.weather=w;const idx2=logs.findIndex(l=>l.id===entry.id);if(idx2>=0){logs[idx2].weather=w;saveQuickLogs(logs);}}}catch(e){}

  const ok = await cloudSave([entry]);
  await sendQuickNtfy(entry);
  _autoDetectQuickOutcomes();
  showToast(ok ? '✅ 저장 완료 + ☁️ 붕쌤에게 전송됨' : '✅ 로컬 저장됨 (☁️ 업로드 실패)');
  renderForm();
}

// ── 자동 경과 감지 (시간대별 NRS + 증상 변화 기반) ──
function _autoDetectQuickOutcomes() {
  const now = kstNow();
  const today = now.date;
  const logs = getQuickEntries();
  const todayLogs = logs.filter(l => l.datetime?.slice(0,10) === today && !l.datetime.includes('시간미상') && l.nrs >= 0);
  if (todayLogs.length < 2) return;
  todayLogs.sort((a,b) => a.datetime.localeCompare(b.datetime));
  let changed = false;
  for (let i = 0; i < todayLogs.length - 1; i++) {
    const cur = todayLogs[i];
    const next = todayLogs[i+1];
    if (cur.outcome && cur.outcome.source !== 'auto') continue;
    if (!(cur.meds?.length > 0 || cur.treatments?.length > 0)) continue;
    const nrsDiff = next.nrs - cur.nrs;
    const symBefore = (cur.symptoms || []).length;
    const symAfter = (next.symptoms || []).length;
    let rating, reason;
    if (nrsDiff <= -2) { rating = 'better'; reason = `NRS ${cur.nrs}→${next.nrs} (${Math.abs(nrsDiff)} 감소)`; }
    else if (nrsDiff === -1) { rating = symAfter < symBefore ? 'better' : 'same'; reason = `NRS ${cur.nrs}→${next.nrs}` + (symAfter < symBefore ? `, 증상 ${symBefore}→${symAfter}개` : ''); }
    else if (nrsDiff === 0) { rating = 'same'; reason = `NRS 변화없음(${cur.nrs})` + (symAfter < symBefore ? `, 증상 ${symBefore}→${symAfter}개 감소` : ''); }
    else if (nrsDiff >= 2) { rating = 'worse'; reason = `NRS ${cur.nrs}→${next.nrs} (${nrsDiff} 증가)`; }
    else { rating = 'same'; reason = `NRS ${cur.nrs}→${next.nrs}`; }
    const timeDiff = Math.round((new Date(next.datetime) - new Date(cur.datetime)) / 60000);
    reason += ` · ${timeDiff}분 후`;
    const allLogs = getQuickLogs();
    const realEntry = allLogs.find(l => l.id === cur.id);
    if (realEntry) {
      realEntry.outcome = { rating, source: 'auto', reason, ratedAt: new Date().toISOString() };
      changed = true;
    }
    if (changed) saveQuickLogs(allLogs);
  }
}

// ── ntfy 알림 (빠른 기록 → 붕쌤 즉시 알림) ──
async function sendQuickNtfy(entry) {
  // 붕쌤 즉시 알림 (토픽 독립 — 붕쌤 토픽 없어도 경과 알림은 별도 예약)
  const topic=localStorage.getItem('om_ntfy_bung');
  if(topic){
    const nrs=entry.nrs>=0?'NRS '+entry.nrs:'';
    const sites=(entry.sites||[]).join(', ');
    const meds=(entry.meds||[]).join(', ');
    const tx=(entry.treatments||[]).join(', ');
    const trg=(entry.triggers||[]).join(', ');
    const body=['🤕 오랑이 두통 기록 (빠른기록)',((entry.datetime||'').slice(11,16)+' '+nrs+' '+sites).trim(),meds?'💊 '+meds:'',tx?'🩺 '+tx:'',trg?'⚡ '+trg:''].filter(Boolean).join('\n');
    try{await fetch('https://ntfy.sh/'+encodeURIComponent(topic),{method:'POST',body:body.trim()});}catch(e){}
  }
  // 경과 알림 예약 (클라이언트 타이머 — 새 기록 시 이전 예약 자동 취소)
  const outcomeDelay=parseInt(document.getElementById('q-outcome-delay')?.value||localStorage.getItem('om_outcome_delay')||'120');
  if(outcomeDelay>0) scheduleOutcomeNtfy(entry,outcomeDelay);
  // 약물 미입력 시 복용 확인 알림 (서버사이드, 설정값 사용)
  const medDelay=parseInt(localStorage.getItem('om_med_reminder_delay')||'30');
  if(medDelay>0&&!(entry.meds||[]).length&&!entry._medReminderSent) _sendMedReminder(entry, medDelay);
}

let _outcomeTimer=null;

function _setOutcomeTimer(entryId,delayMin){
  if(_outcomeTimer) clearTimeout(_outcomeTimer);
  const logs=getQuickLogs();
  const idx=logs.findIndex(l=>String(l.id)===String(entryId));
  if(idx<0) return false;
  const delayMs=delayMin*60000;
  logs[idx].outcomeNotifyAt=Date.now()+delayMs;
  logs[idx].outcomeNotifySent=false;
  saveQuickLogs(logs);
  cloudSave([logs[idx]]);
  // ntfy 서버사이드 스케줄링 — 페이지 닫혀도 알림 도착
  _sendServerScheduledNtfy(logs[idx],delayMin);
  // UI 갱신용 로컬 타이머 (발송은 서버가 함)
  _outcomeTimer=setTimeout(()=>_markOutcomeSent(entryId),delayMs);
  return true;
}
function _markOutcomeSent(entryId){
  const logs=getQuickLogs();
  const idx=logs.findIndex(l=>String(l.id)===String(entryId));
  if(idx>=0&&!logs[idx].outcomeNotifySent){logs[idx].outcomeNotifySent=true;saveQuickLogs(logs);cloudSave([logs[idx]]);}
}
async function _sendServerScheduledNtfy(entry,delayMin){
  const orangiTopic=localStorage.getItem('om_ntfy_orangi');
  if(!orangiTopic||entry.outcome) return;
  const nrs=entry.nrs>=0?'NRS '+entry.nrs:'';
  const meds=(entry.meds||[]).join(', ');
  const baseUrl=location.href.split('#')[0].split('?')[0].replace(/\/[^/]*$/,'/');
  const rateUrl=baseUrl+'rate.html';
  const info=[(entry.datetime||'').slice(11,16),nrs,meds].filter(Boolean).join(' ');
  const actions='view,😊 호전,'+rateUrl+'?r=better&id='+entry.id+';view,😐 비슷,'+rateUrl+'?r=same&id='+entry.id+';view,😣 악화,'+rateUrl+'?r=worse&id='+entry.id+';view,🤷 모름,'+rateUrl+'?r=unknown&id='+entry.id;
  // delay만 쿼리에, title/actions는 URL 길이 최소화를 위해 분리
  const ntfyUrl='https://ntfy.sh/'+encodeURIComponent(orangiTopic)+'?delay='+delayMin+'m&title='+encodeURIComponent('🤕 두통 경과 확인')+'&actions='+encodeURIComponent(actions);
  try{
    const resp=await fetch(ntfyUrl,{method:'POST',body:info+' → 지금 어때요?'});
    if(!resp.ok) console.warn('ntfy scheduled resp:',resp.status);
  }catch(e){
    console.warn('ntfy scheduled send failed:',e);
    // 서버 발송 실패 시 폴백: 로컬 outcomeNotifyAt 기반으로 페이지 재방문 시 즉시 발송
    entry._ntfyFallback=true;
  }
}

function scheduleOutcomeNtfy(entry,customDelayMin){
  const delayMin=customDelayMin||parseInt(localStorage.getItem('om_outcome_delay')||'120');
  _setOutcomeTimer(String(entry.id),delayMin);
}

// 경과 알림 시간 변경 시 기본값 고정 여부 확인
function _onOutcomeDelayChange(val){

  if(val===current) return;
  const labels={'0':'안 보냄','30':'30분','60':'1시간','90':'1시간 30분','120':'2시간','180':'3시간'};
  if(confirm('앞으로도 경과 알림을 '+(labels[val]||val+'분')+' 후로 고정할까요?\n\n확인 → 기본값 변경\n취소 → 이번만 적용')){
    localStorage.setItem('om_outcome_delay',val);
    syncNtfyConfig();
    showToast('⏱ 기본 경과 알림: '+(labels[val]||val+'분'));

}

function rescheduleOutcome(entryId,delayMin){

async function sendOutcomeNtfy(entryId){
  const logs=getQuickEntries();
  const entry=logs.find(l=>String(l.id)===String(entryId));
  if(!entry||entry.outcome||entry.outcomeNotifySent) return;
  // 멀티탭 레이스 컨디션 방지: outcomeNotifyAt이 없거나 이미 과거가 아니면 스킵
  if(!entry.outcomeNotifyAt) return;
  // 발송 완료 표시
  const allLogs=getQuickLogs();
  const idx=allLogs.findIndex(l=>String(l.id)===String(entryId));
  if(idx>=0){allLogs[idx].outcomeNotifySent=true;saveQuickLogs(allLogs);cloudSave([allLogs[idx]]);}
  const orangiTopic=localStorage.getItem('om_ntfy_orangi');
  if(!orangiTopic) return;
  const nrs=entry.nrs>=0?'NRS '+entry.nrs:'';
  const meds=(entry.meds||[]).join(', ');
  const baseUrl=location.href.split('#')[0].split('?')[0].replace(/\/[^/]*$/,'/');
  const rateUrl=baseUrl+'rate.html';
  const info=[(entry.datetime||'').slice(11,16),nrs,meds].filter(Boolean).join(' ');
  const actions='view,😊 호전,'+rateUrl+'?r=better&id='+entryId+';view,😐 비슷,'+rateUrl+'?r=same&id='+entryId+';view,😣 악화,'+rateUrl+'?r=worse&id='+entryId+';view,🤷 모름,'+rateUrl+'?r=unknown&id='+entryId;
  const ntfyUrl='https://ntfy.sh/'+encodeURIComponent(orangiTopic)+'?title='+encodeURIComponent('🤕 두통 경과 확인')+'&actions='+encodeURIComponent(actions);
  try{await fetch(ntfyUrl,{method:'POST',body:info+' → 지금 어때요?'});}catch(e){console.warn('ntfy outcome failed:',e);}
}

function checkPendingOutcome(){
  const logs=getQuickEntries();
  const now=Date.now();
  for(let i=logs.length-1;i>=0;i--){
    const l=logs[i];
    if(l.outcome||l.outcomeNotifySent||!l.outcomeNotifyAt) continue;
    if(now>=l.outcomeNotifyAt){
      // 예정 시각 경과 — 서버가 보냈어야 하지만 혹시 실패했을 수 있으므로 폴백 발송
      sendOutcomeNtfy(l.id);
      _markOutcomeSent(l.id);
    } else {
      // 아직 미도래 — UI 갱신용 타이머 + 만료 시 폴백 발송
      if(_outcomeTimer) clearTimeout(_outcomeTimer);
      _outcomeTimer=setTimeout(()=>{sendOutcomeNtfy(l.id);_markOutcomeSent(l.id);},l.outcomeNotifyAt-now);
    }
    break; // 가장 최근 미발송 1건만 처리
  }
}

    const _oRating=l.outcome?.rating;const _oAuto=l.outcome?.source==='auto';
    const outcomeTag = l.outcome
      ? `<span class="log-tag" onclick="event.stopPropagation();quickEditOutcome(${l.id})" style="cursor:pointer;background:${_oRating==='better'?'#dcfce7':_oRating==='same'?'#fef3c7':_oRating==='unknown'?'#f3f4f6':'#fee2e2'};color:${_oRating==='better'?'#15803d':_oRating==='same'?'#92400e':_oRating==='unknown'?'#4b5563':'#b91c1c'}" title="${esc(l.outcome.reason||'')}">${_oRating==='better'?'🟢호전':_oRating==='same'?'🟡비슷':_oRating==='unknown'?'🤷모름':'🔴악화'}${_oAuto?' <span style="font-size:.5rem;opacity:.7">자동</span>':''}</span>`
      : `<span class="log-tag" onclick="event.stopPropagation();quickEditOutcome(${l.id})" style="cursor:pointer;background:#f5f3ff;color:#7c3aed;border:1px dashed #c4b5fd">+ 경과</span>`;
    const nrsHtml = l.nrs >= 0
      ? `<span class="log-item-nrs" style="background:${nrsColor(l.nrs)}">NRS ${l.nrs}</span>`
      : '';
    const badge = l.synced
      ? '<span class="log-item-badge synced">반영됨</span>'
      : '<span class="log-item-badge pending">미반영</span>';
    const wInfo=l.weather?`<span style="font-size:.55rem;color:var(--mu2)">${l.weather.condition} ${l.weather.temp}° ${l.weather.pressure}hPa</span>`:'';
    return `<div class="log-item" style="${l.synced?'opacity:.7':''}" ${l.synced?`onclick="toggleLogDetail(${l.id})"`:''}>
      <div class="log-item-head">
        <span class="log-item-date">${dateStr} ${timeStr}</span>
        ${nrsHtml} ${badge} ${wInfo}
      </div>
      ${tags||outcomeTag ? `<div class="log-item-tags">${tags}${outcomeTag}</div>` : ''}
      ${l.memo ? `<div class="log-item-memo">${esc(l.memo)}</div>` : ''}
      ${l.synced?`<div id="log-detail-${l.id}" class="log-detail" style="display:none">
        <div style="font-size:.72rem;color:var(--mu);border-top:1px solid var(--bd);padding-top:8px;margin-top:6px">
          ${(l.sites||[]).length?`<div><strong>부위:</strong> ${(l.sites||[]).map(s=>esc(s)).join(', ')}</div>`:''}
          ${(l.painType||[]).length?`<div><strong>통증:</strong> ${(l.painType||[]).map(p=>esc(p)).join(', ')}</div>`:''}
          ${(l.symptoms||[]).length?`<div><strong>증상:</strong> ${(l.symptoms||[]).map(s=>esc(s)).join(', ')}</div>`:''}
          ${(l.meds||[]).length?`<div><strong>투약:</strong> ${(l.meds||[]).map(m=>esc(m)).join(', ')}</div>`:''}
          ${(l.treatments||[]).length?`<div><strong>치료:</strong> ${(l.treatments||[]).map(t=>esc(t)).join(', ')}</div>`:''}
          ${(l.triggers||[]).length?`<div><strong>트리거:</strong> ${(l.triggers||[]).map(t=>esc(t)).join(', ')}</div>`:''}
          ${l.memo?`<div><strong>메모:</strong> ${esc(l.memo)}</div>`:''}
          <div style="color:var(--mu2);margin-top:4px">✅ 반영 완료 · 수정 불가</div>
        </div>
      </div>
      <div class="log-item-actions"><span style="font-size:.68rem;color:var(--ac);cursor:pointer">탭하여 상세 보기</span></div>`
      :`<div class="log-item-actions">
        ${!(l.meds||[]).length?`<button class="btn-sm" onclick="event.stopPropagation();quickAddMeds(${l.id})" style="background:#7c3aed;color:#fff;border-color:#7c3aed">💊 복용 추가</button>`:''}
        <button class="btn-sm" onclick="editEntry(${l.id})">수정</button>
        <button class="btn-sm del" onclick="deleteEntry(${l.id})">삭제</button>
      </div>`}
    </div>`;
  }).join('');
}

function toggleLogDetail(id) {
  const el = document.getElementById('log-detail-' + id);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function editEntry(id) {
  const logs = getQuickLogs();
  const entry = logs.find(l => l.id === id);
  if (!entry) return;
  switchTab('form');
  setTimeout(() => renderForm(entry), 50);
}

function quickEditOutcome(id) {
  const logs=getQuickLogs();
  const entry=logs.find(l=>l.id===id);
  if(!entry) return;
  const dt=entry.datetime||'';
  const time=dt.slice(11,16);
  const nrs=entry.nrs>=0?'NRS '+entry.nrs:'';
  const current=entry.outcome?.rating;
  const labels={better:'😊 호전',same:'😐 비슷',worse:'😣 악화',unknown:'🤷 모르겠어요'};
  const colors={better:['#16a34a','#dcfce7','#15803d'],same:['#f59e0b','#fef3c7','#92400e'],worse:['#dc2626','#fee2e2','#b91c1c'],unknown:['#6b7280','#f3f4f6','#4b5563']};

  var html=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)this.remove()">
    <div style="background:var(--bg,#fff);border:1.5px solid var(--bd);border-radius:14px;padding:20px;max-width:320px;width:85vw;box-shadow:0 4px 20px rgba(0,0,0,.3)">
      <div style="font-size:.82rem;font-weight:600;margin-bottom:4px;color:var(--ink,#1a1a1a)">📋 경과 기록</div>
      <div style="font-size:.72rem;color:var(--mu);margin-bottom:14px">${dt.slice(0,10)} ${time} ${nrs}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${['better','same','worse','unknown'].map(r=>{
          const c=colors[r];const sel=current===r;
          return `<button onclick="saveQuickOutcome(${id},'${r}')" style="padding:12px;border:2px solid ${c[0]};background:${sel?c[1]:c[0]+'18'};border-radius:10px;font-size:.92rem;font-weight:${sel?'700':'500'};cursor:pointer;font-family:inherit;color:${sel?c[2]:c[0]}">${labels[r]}</button>`;
        }).join('')}
      </div>
      ${current?`<button onclick="saveQuickOutcome(${id},null)" style="display:block;margin:12px auto 0;font-size:.72rem;color:var(--mu);background:none;border:none;cursor:pointer;text-decoration:underline">경과 삭제</button>`:''}
    </div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function saveQuickOutcome(id,rating) {
  const logs=getQuickLogs();
  const idx=logs.findIndex(l=>l.id===id);
  if(idx<0) return;
  if(rating){
    logs[idx].outcome={rating:rating,ratedAt:new Date(Date.now()+9*3600000).toISOString()};
  } else {
    delete logs[idx].outcome;
  }
  saveQuickLogs(logs);
  await cloudSave([logs[idx]]);
  document.querySelector('[onclick*="this.remove"]')?.closest('div[style*="position:fixed"]')?.remove();
  showToast(rating?'📝 경과 저장됨':'🗑 경과 삭제됨');
  renderList();
}

async function deleteEntry(id) {
  if (!confirm('삭제할까요?')) return;
  const logs = getQuickLogs().filter(l => l.id !== id);
  saveQuickLogs(logs);
  showToast('🗑 삭제 중...');
  // 클라우드에 전체 목록 덮어쓰기 (삭제 확실 반영)
  await cloudSaveAll(logs);
  showToast('🗑 삭제됨');
  renderList();
}

// 클라우드에 전체 목록을 덮어쓰기 (삭제/수정 반영)
async function cloudSaveAll(logs) {
  const url = getSyncUrl();
  if (!url) return false;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'replaceAll', entries: logs }),
      redirect: 'follow'
    });
    return res.ok || res.type === 'opaqueredirect' || res.redirected;
  } catch (e) { return false; }
}

// ── Cloud Sync ──
const SYNC_URL_KEY = 'om_quick_sync_url';
const DEFAULT_SYNC_URL = 'https://script.google.com/macros/s/AKfycbzYF46qeLJRGIQsqfXbic6ITRGKr1eA9chrVJ8Fu5_gM7TDSYUFlpaWQGmSR9RdAACjzw/exec';

function getSyncUrl() { return localStorage.getItem(SYNC_URL_KEY) || DEFAULT_SYNC_URL; }
function saveSyncUrl(url) { localStorage.setItem(SYNC_URL_KEY, url.trim()); }

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) {
    document.getElementById('sync-url-input').value = getSyncUrl();
    document.getElementById('sync-indicator').innerHTML = getSyncUrl()
      ? '<span style="color:#2d6a4f">☁️ 동기화 활성</span>' : '<span style="color:#c03030">동기화 꺼짐</span>';
    document.getElementById('ntfy-bung-input').value = localStorage.getItem('om_ntfy_bung')||'';
    document.getElementById('ntfy-orangi-input').value = localStorage.getItem('om_ntfy_orangi')||'';
    document.getElementById('ntfy-delay-input').value = localStorage.getItem('om_outcome_delay')||'120';
    document.getElementById('ntfy-med-delay-input').value = localStorage.getItem('om_med_reminder_delay')||'30';
  }
}

function setSyncStatus(msg, cls) {
  document.getElementById('sync-status').innerHTML = msg ? `<span class="sync-status ${cls}">${msg}</span>` : '';
}

async function testSyncUrl() {
  const url = getSyncUrl();
  if (!url) { setSyncStatus('URL을 입력하세요', 'sync-fail'); return; }
  setSyncStatus('연결 중...', 'sync-ing');
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.ok) setSyncStatus(`연결 성공 (${data.entries.length}건 저장됨)`, 'sync-ok');
    else setSyncStatus('응답 오류', 'sync-fail');
  } catch (e) { setSyncStatus('연결 실패: ' + e.message, 'sync-fail'); }
}

async function cloudSave(entries) {
  const url = getSyncUrl();
  if (!url || !entries.length) return false;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', entries }),
      redirect: 'follow'
    });
    // Apps Script redirects → check final response
    if (res.ok || res.type === 'opaqueredirect' || res.redirected) return true;
    return false;
  } catch (e) { return false; }
}

async function syncAllToCloud() {
  const logs = getQuickLogs();
  if (!logs.length) { showToast('업로드할 기록이 없습니다'); return; }
  const url = getSyncUrl();
  if (!url) { showToast('동기화 URL을 먼저 설정하세요'); return; }
  setSyncStatus('업로드 중...', 'sync-ing');
  try {
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'save', entries: logs, customs: getAllCustoms() }),
      redirect: 'follow'
    });
    setSyncStatus(`${logs.length}건 업로드 완료`, 'sync-ok');
    showToast(`☁️ ${logs.length}건 업로드 완료`);
  } catch (e) { setSyncStatus('업로드 실패', 'sync-fail'); }
}

async function fetchCloudStatus() {
  const url = getSyncUrl();
  if (!url) return;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.ok) return;
    // 클라우드가 진실: 클라우드 데이터를 기반으로 로컬 갱신
    const local = getQuickLogs();
    const cloudEntries = data.entries || [];

    // 클라우드에서 커스텀 항목 복원
    if(data.customs) { setAllCustoms(data.customs); }

    // 클라우드 데이터를 기반으로 로컬 머지 (outcome 등 업데이트 포함)
    const cloudIds = new Map(cloudEntries.map(e => [String(e.id), e]));
    const localIds = new Set(local.map(l => String(l.id)));
    const localOnly = local.filter(l => !cloudIds.has(String(l.id)) && !l.synced);

    // 클라우드 항목의 outcome을 로컬에 반영
    let outcomeUpdated = false;
    for (let i = 0; i < local.length; i++) {
      const ce = cloudIds.get(String(local[i].id));
      if (ce && ce.outcome && !local[i].outcome) {
        local[i].outcome = ce.outcome;
        outcomeUpdated = true;
      }
    }

    // 클라우드 데이터 + 로컬 미전송 = 최종 목록
    const merged = [...cloudEntries, ...localOnly];
    merged.sort((a, b) => (a.datetime || '').localeCompare(b.datetime || ''));

    const oldJSON = JSON.stringify(local.map(l=>l.id).sort());
    const newJSON = JSON.stringify(merged.map(l=>l.id).sort());
    if (oldJSON !== newJSON || local.length !== merged.length || outcomeUpdated) {
      saveQuickLogs(merged);
      renderRecentQuickLogs();
      updatePendingCount();
    }
    // 클라우드에서 받은 설정(ntfy 등) 적용
    applyQuickConfig();
  } catch (e) { /* 오프라인 — 로컬 캐시 사용 */ }
}

// ── Init ──
applyQuickConfig();
renderForm();
updatePendingCount();
checkPendingOutcome(); // 미발송 경과 알림 체크
// URL 해시로 탭 자동 전환 (#outcome → 경과 탭)
const _handleHash=()=>{
  const h=location.hash;
  // #rate-{rating}-{id} → 경과 바로 기록
  const rateMatch=h.match(/^#rate-(better|same|worse|unknown)-(\d+)$/);
  if(rateMatch){
    const [,rating,id]=rateMatch;
    rateQuickOutcomeById(id,rating);
    history.replaceState(null,null,location.pathname+location.search); // 해시 제거 (hashchange 이벤트 방지)
    switchTab('outcome');
    return;
  }
  // #addmeds-{id} → 복용 추가 모달
  const medMatch=h.match(/^#addmeds-(\d+)$/);
  if(medMatch){
    history.replaceState(null,null,location.pathname+location.search);
    switchTab('list');
    setTimeout(()=>quickAddMeds(parseInt(medMatch[1])),300);
    return;
  }
  if(h==='#outcome') switchTab('outcome');
  else if(h==='#list') switchTab('list');
  else if(!h || h==='#form') switchTab('form');
};
window.addEventListener('hashchange',_handleHash);
_handleHash();
// 앱 시작 시 클라우드에서 전체 동기화
fetchCloudStatus();
// 포그라운드 복귀 시 재동기화
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    fetchCloudStatus(); checkPendingOutcome();
    // 탭 복귀 시 현재 탭 데이터 갱신 (rate.html에서 경과 저장 후 돌아왔을 때)
    const tabs=document.querySelectorAll('.tab');
    if(tabs[2].classList.contains('active')) renderList();
    else if(tabs[1].classList.contains('active')) renderOutcomeTab();
  }
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Quick 프리셋 ──
function _qPresetKey() { return 'om_presets_orangi-migraine'; } // quick은 편두통 전용
function _loadQPresets() { try{return JSON.parse(localStorage.getItem(_qPresetKey())||'[]');}catch(e){return [];} }
function _saveQPresets(list) { localStorage.setItem(_qPresetKey(),JSON.stringify(list)); }

function saveQuickPreset() {
  var chips=[];
  document.querySelectorAll('.chip.sel').forEach(function(c){
    chips.push({group:c.dataset.group||'',val:c.dataset.val||''});
  });
  if(!chips.length){alert('선택된 항목이 없어요');return;}
  var label=chips.map(function(c){return c.val;}).join(' · ');
  var name=prompt('프리셋 이름:',label);
  if(!name||!name.trim()) return;
  var presets=_loadQPresets();
  presets.push({name:name.trim(),chips:chips});
  _saveQPresets(presets);
  alert('⭐ 프리셋 저장됨');
}

function showQuickPresetList() {
  var presets=_loadQPresets();
  if(!presets.length){alert('저장된 프리셋이 없어요');return;}
  var msg=presets.map(function(p,i){return (i+1)+'. '+p.name+' ('+p.chips.length+'개)';}).join('\n');
  var choice=prompt('번호를 입력하세요:\n'+msg);
  if(!choice) return;
  var idx=parseInt(choice)-1;
  if(idx>=0&&idx<presets.length) applyQuickPreset(idx);
}

function applyQuickPreset(idx) {
  var presets=_loadQPresets();
  var p=presets[idx]; if(!p) return;
  document.querySelectorAll('.chip.sel').forEach(function(c){c.classList.remove('sel');});
  p.chips.forEach(function(chip){
    var el=document.querySelector('.chip[data-group="'+chip.group+'"][data-val="'+chip.val+'"]');
    if(el) el.click();
  });
}
