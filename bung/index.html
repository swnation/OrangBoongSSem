<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06b6d4">
<title>Daily Check</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f0eb;--sf:#fff;--sf2:#f9f7f4;--bd:#e0dbd2;--bd2:#d0c9be;--ink:#1a1917;--mu:#7a7672;--mu2:#a09b96;--ac:#06b6d4;--gr:#2d6a4f;--re:#c03030;--font:'IBM Plex Sans KR',sans-serif;--mono:'IBM Plex Mono',monospace}
@media(prefers-color-scheme:dark){:root{--bg:#0f1118;--sf:#1a1d28;--sf2:#22262f;--bd:#2a2e3a;--bd2:#353a48;--ink:#e4e2dd;--mu:#8a8682;--mu2:#5a5854;--ac:#22d3ee;--gr:#4a9a7a;--re:#e05050}}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px}
.app{height:100%;display:flex;flex-direction:column;overflow:hidden;max-width:500px;margin:0 auto}
.header{background:var(--sf);border-bottom:1.5px solid var(--bd);padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-title{font-size:.95rem;font-weight:600;flex:1}
.tabs{display:flex;border-bottom:1.5px solid var(--bd);background:var(--sf);flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:.82rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--mu);font-family:var(--font);border-bottom:2px solid transparent}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:600}
.body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.domain-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 12px;border-radius:8px}
.domain-header span{font-size:.85rem;font-weight:600}
.condition-name{font-size:.68rem;color:var(--mu);font-weight:600;margin:8px 0 4px 4px;letter-spacing:.05em}
.med-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px;background:var(--sf2);cursor:pointer;-webkit-tap-highlight-color:transparent}
.med-row:active{background:var(--bd)}
.med-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--ac);pointer-events:none;flex-shrink:0}
.med-row label{flex:1;font-size:.85rem;pointer-events:none}
.med-row .prn{font-size:.6rem;font-weight:600;padding:2px 6px;border-radius:4px;background:#fef3c7;color:#92400e}
@media(prefers-color-scheme:dark){.med-row .prn{background:#422006;color:#fbbf24}}
.memo{width:100%;border:1.5px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:.85rem;resize:none;outline:none;background:var(--sf2);color:var(--ink);min-height:50px}
.memo:focus{border-color:var(--ac)}
.btn-save{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:8px}
.btn-save:active{transform:scale(.98);opacity:.85}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.save-status{font-size:.72rem;margin-top:6px;line-height:1.6}
.login-box{text-align:center;padding:60px 20px}
.login-box h2{font-size:1.1rem;margin-bottom:8px}
.login-box p{font-size:.8rem;color:var(--mu);margin-bottom:20px}
.btn-login{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:var(--font)}
.date-nav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px}
.date-nav button{background:none;border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:.8rem;cursor:pointer;color:var(--ink);font-family:var(--font)}
.date-nav .date-label{font-size:.88rem;font-weight:600;min-width:120px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.cal-header{font-size:.62rem;text-align:center;color:var(--mu);font-weight:600;padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;border-radius:6px;cursor:pointer;font-size:.72rem;min-height:36px}
.cal-day:hover{background:var(--sf2)}
.cal-day.today{font-weight:700;border:1.5px solid var(--ac)}
.cal-day.bulk-sel{background:var(--ac);color:#fff;border-radius:6px}
.cal-day .dot{width:8px;height:8px;border-radius:50%;margin:2px auto 0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;font-size:.82rem;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.loading{text-align:center;padding:40px;color:var(--mu);font-size:.85rem}
.nrs-wrap{display:flex;align-items:center;gap:10px;margin:6px 0}
.nrs-wrap input[type=range]{flex:1;accent-color:var(--ac);height:24px}
.nrs-val{font-size:1.3rem;font-weight:700;min-width:28px;text-align:center}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}
.chip{padding:5px 12px;border-radius:18px;border:1.5px solid var(--bd);font-size:.78rem;cursor:pointer;user-select:none;background:var(--sf2)}
.chip:active{transform:scale(.96)}
.chip.sel{font-weight:600;color:#fff;background:var(--ac);border-color:var(--ac)}
.btn-toggle{font-size:.62rem;padding:3px 8px;border:1px solid var(--bd);border-radius:5px;background:none;color:var(--mu);cursor:pointer;font-family:var(--font)}
.btn-toggle:hover{border-color:var(--ac);color:var(--ac)}
.dc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dc-label{font-size:.75rem;min-width:48px;color:var(--mu)}
.dc-btns{display:flex;gap:3px}
.dc-btn{width:28px;height:28px;border:1.5px solid var(--bd);border-radius:6px;background:var(--sf2);font-size:.72rem;font-weight:600;cursor:pointer;color:var(--mu);font-family:var(--font)}
.dc-btn.sel{background:var(--ac);color:#fff;border-color:var(--ac)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span style="font-size:1.3rem">💊</span>
    <span class="header-title">붕쌤 Daily Check</span>
    <button onclick="refreshData()" style="background:none;border:none;font-size:1rem;cursor:pointer;padding:4px" title="새로고침">🔄</button>
    <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:var(--mu2)"></span>
  </div>
  <div class="tabs" id="tab-bar" style="display:none">
    <button class="tab active" onclick="switchTab(0)">✅ 체크</button>
    <button class="tab" onclick="switchTab(1)">📅 캘린더</button>
  </div>
  <div class="body" id="content">
    <div class="login-box">
      <h2>💊 붕쌤 데일리 체크</h2>
      <p>약물 · 영양제 · 컨디션을 한번에 체크하세요</p>
      <button class="btn-login" onclick="signIn()">Google 로그인</button>
      <div id="gsi-status" style="font-size:.7rem;color:var(--mu);margin-top:12px">인증 준비 중...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID='103056429713-6ne324793lgc09nl9rkjqonlg4pcd12i.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const BUNG_DOMAINS={
  'bung-mental':{icon:'🩵',label:'마음관리',color:'#06b6d4',folder:'Bung Mental',masterFile:'bung_mental_master.json',logPrefix:'bung_mental_log',
    symptoms:['불안','우울감','번아웃','불면','무기력','과민','집중력저하','공황','식욕변화'],
    dailyChecks:['수면','집중력','발화','기억력','에너지','식욕'],nrsLabel:'기분'},
  'bung-health':{icon:'💪',label:'건강관리',color:'#f59e0b',folder:'Bung Health',masterFile:'bung_health_master.json',logPrefix:'bung_health_log',
    symptoms:['통풍발작','소화불량','피로','두통','근육통','불면'],dailyChecks:[],nrsLabel:'컨디션 (0=최악 10=최상)'},
  'bungruki':{icon:'🍼',label:'임신준비',color:'#ec4899',folder:'Bungruki Pregnancy',masterFile:'bungruki_master.json',logPrefix:'bungruki_log',
    symptoms:[],dailyChecks:[],nrsLabel:'컨디션 (0=최악 10=최상)'},
};
let token=null,tokenClient=null,_tokenExpiresAt=0,_tokenRefreshTimer=null,_tokenRefreshResolve=null;
let domainData={};
let currentTab=0,selectedDate='';
let bulkMode=false,bulkDates=new Set();

function kstNow(){return new Date(Date.now()+9*3600000);}
function kstToday(){return kstNow().toISOString().slice(0,10);}
function kstTimeStr(){return kstNow().toISOString().slice(11,16);}
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
let _toastTimer;
function showToast(msg,ms){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),ms||2000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// AUTH
function signIn(){if(!window.google?.accounts?.oauth2){showToast('인증 로딩 중...',2000);return;}if(!tokenClient)tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:handleToken});tokenClient.requestAccessToken();}
function scheduleTokenRefresh(s){if(_tokenRefreshTimer)clearTimeout(_tokenRefreshTimer);_tokenExpiresAt=Date.now()+s*1000;_tokenRefreshTimer=setTimeout(()=>{if(tokenClient)tokenClient.requestAccessToken({prompt:''});},Math.max((s-300)*1000,60000));}
function isTokenExpired(){return _tokenExpiresAt>0&&Date.now()>_tokenExpiresAt;}
async function ensureValidToken(){if(!token)return false;if(!isTokenExpired())return true;if(!tokenClient)return false;return new Promise(r=>{_tokenRefreshResolve=r;tokenClient.requestAccessToken({prompt:''});});}
function handleToken(resp){
  if(resp.error){if(_tokenRefreshResolve){_tokenRefreshResolve(false);_tokenRefreshResolve=null;}showToast('❌ 로그인 실패',3000);return;}
  const isR=!!token;token=resp.access_token;localStorage.setItem('om_auto_login','true');scheduleTokenRefresh(resp.expires_in||3600);
  if(_tokenRefreshResolve){_tokenRefreshResolve(true);_tokenRefreshResolve=null;return;}if(isR)return;
  document.getElementById('status-dot').style.background='#2d8a5a';document.getElementById('tab-bar').style.display='flex';
  selectedDate=kstToday();loadAllDomains();
}
function checkGSI(n){if(!n)n=0;if(window.google?.accounts?.oauth2){document.getElementById('gsi-status').textContent='✓ 준비됨';document.getElementById('gsi-status').style.color='#2d6a4f';if(localStorage.getItem('om_auto_login')==='true'){try{if(!tokenClient)tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:handleToken});tokenClient.requestAccessToken({prompt:''});}catch(e){console.error('Auto-login failed:',e);}}}else if(n<20){setTimeout(()=>checkGSI(n+1),500);}else{document.getElementById('gsi-status').textContent='⚠️ 인증 실패';}}
checkGSI(0);

// DRIVE
async function fetchWithRetry(url,opts,mx){if(!mx)mx=2;for(let i=0;i<=mx;i++){try{const r=await fetch(url,opts);if(r.ok||r.status<429)return r;if(i<mx&&(r.status===429||r.status>=500)){await new Promise(r=>setTimeout(r,1000*(i+1)));continue;}return r;}catch(e){if(i<mx){await new Promise(r=>setTimeout(r,1000*(i+1)));continue;}throw e;}}}
async function driveSearch(n,p){if(isTokenExpired())await ensureValidToken();let q="name='"+n+"' and trashed=false";if(p)q+=" and '"+p+"' in parents";const r=await fetchWithRetry('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:{Authorization:'Bearer '+token}});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.files||[];}
async function driveRead(id){if(isTokenExpired())await ensureValidToken();return(await fetchWithRetry('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+token}})).json();}
async function driveCreate(n,data,p){if(isTokenExpired())await ensureValidToken();const b='om_bd_x7',meta=JSON.stringify(p?{name:n,mimeType:'application/json',parents:[p]}:{name:n,mimeType:'application/json'}),body='--'+b+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+b+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(data)+'\r\n--'+b+'--';const r=await fetchWithRetry('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'multipart/related; boundary='+b},body});const d=await r.json();if(d.error)throw new Error(d.error.message);return d.id;}
async function driveUpdate(id,data){if(isTokenExpired())await ensureValidToken();const r=await fetchWithRetry('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(data)});const d=await r.json();if(d.error)throw new Error(d.error.message);return d;}
async function getOrCreateFolder(n){if(isTokenExpired())await ensureValidToken();const q="name='"+n+"' and mimeType='application/vnd.google-apps.folder' and trashed=false";const r=await fetchWithRetry('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:{Authorization:'Bearer '+token}});const d=await r.json();if(d.error)throw new Error(d.error.message);if(d.files?.length>0)return d.files[0].id;const cr=await fetchWithRetry('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:n,mimeType:'application/vnd.google-apps.folder'})});const cd=await cr.json();if(cd.error)throw new Error(cd.error.message);return cd.id;}

// DATA LOADING (multi-month cache)
async function loadAllDomains(){
  document.getElementById('content').innerHTML='<div class="loading">📡 로딩 중...</div>';
  await Promise.all(Object.entries(BUNG_DOMAINS).map(async([id,dc])=>{
    try{
      if(!domainData[id])domainData[id]={logs:{}};
      const ds=domainData[id];
      ds.folderId=await getOrCreateFolder(dc.folder);
      const mf=await driveSearch(dc.masterFile,ds.folderId);
      if(mf.length>0){ds.masterFileId=mf[0].id;ds.master=await driveRead(ds.masterFileId);}
      else ds.master={conditions:[]};
      await loadLogMonth(id,selectedDate.slice(0,7));
    }catch(e){console.error('Load '+id+':',e);}
  }));
  renderCheckTab();
}
async function loadLogMonth(id,month){
  const ds=domainData[id];if(!ds?.folderId||ds.logs[month])return;
  const dc=BUNG_DOMAINS[id];
  try{const f=await driveSearch(dc.logPrefix+'_'+month+'.json',ds.folderId);
    if(f.length>0){const data=await driveRead(f[0].id);ds.logs[month]={fileId:f[0].id,data:Array.isArray(data)?data:[]};}
    else ds.logs[month]={fileId:null,data:[]};
  }catch(e){ds.logs[month]={fileId:null,data:[]};}
}
function findEntry(id,date){const ml=domainData[id]?.logs?.[date.slice(0,7)];return ml?.data?.find(l=>l.datetime?.slice(0,10)===date)||null;}

// 날짜별 활성 약물 (medHistory 반영 — 메인앱 getMedsAtDate 동일)
function _medsAtDate(condition,date){
  const hist=condition.medHistory;
  if(!hist?.length)return condition.medsList||[];
  const sorted=[...hist].sort((a,b)=>a.date.localeCompare(b.date));
  let meds=null;
  for(const h of sorted){if(h.date.localeCompare(date)>0)break;if(h.meds?.length)meds=h.meds;}
  return meds||condition.medsList||[];
}

function getDomainMeds(id,date){
  const ds=domainData[id];if(!ds?.master?.conditions)return[];
  const d=date||selectedDate;
  return(ds.master.conditions||[]).filter(c=>c.status==='active'||c.status==='remission')
    .map(c=>({condition:c.name,meds:_medsAtDate(c,d)})).filter(g=>g.meds.length);
}

// 새로고침 — 캐시 무효화 + Drive 재로드
async function refreshData(){
  showToast('🔄 새로고침 중...');
  for(const id of Object.keys(BUNG_DOMAINS)){
    if(domainData[id])domainData[id].logs={}; // 캐시 전체 클리어
  }
  await loadAllDomains();
  showToast('✅ 최신 데이터 로드됨');
}

// TAB
function switchTab(idx){currentTab=idx;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));if(idx===0)renderCheckTab();else renderCalendarTab();}

// ═══════════════════════════════════════════════════════════════
// CHECK TAB
// ═══════════════════════════════════════════════════════════════
let editingEntryId=null; // null=새기록, string=수정

// 날짜의 고유 엔트리 목록 (도메인 간 중복 제거 — datetime 기준)
function getDateEntries(date){
  const byTime={};
  for(const domId of Object.keys(BUNG_DOMAINS)){
    const ml=domainData[domId]?.logs?.[date.slice(0,7)];
    if(!ml?.data)continue;
    ml.data.filter(l=>l.datetime?.slice(0,10)===date).forEach(e=>{
      const key=e.datetime||'';
      if(!byTime[key])byTime[key]={...e,_domains:[domId]};
      else byTime[key]._domains.push(domId);
    });
  }
  return Object.values(byTime).sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||''));
}

function renderCheckTab(){
  const content=document.getElementById('content');
  let html='';const isToday=selectedDate===kstToday();
  const existingEntries=getDateEntries(selectedDate);
  const editEntry=editingEntryId?existingEntries.find(e=>e.datetime===editingEntryId):null;
  const anyEntry=editEntry||existingEntries[0];

  // Date nav
  html+='<div class="date-nav"><button onclick="changeDate(-1)">◀</button>';
  html+='<span class="date-label">'+selectedDate+(isToday?' (오늘)':'')+'</span>';
  html+='<button onclick="changeDate(1)"'+(isToday?' disabled':'')+'>▶</button></div>';

  // 기존 기록 목록
  if(existingEntries.length){
    html+='<div class="card"><div style="font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:6px">📋 이 날짜 기록 ('+existingEntries.length+'건)</div>';
    existingEntries.forEach(e=>{
      const isEditing=editingEntryId===e.datetime;
      const time=e.datetime?.slice(11,16)||'';
      const mcCount=e.medCheck?Object.values(e.medCheck).filter(v=>v).length+'/'+Object.keys(e.medCheck).length:'';
      html+='<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;margin-bottom:3px;background:'+(isEditing?'var(--ac)20':'var(--sf2)')+';border:1px solid '+(isEditing?'var(--ac)':'var(--bd)')+'">';
      html+='<span style="cursor:pointer;flex:1;display:flex;align-items:center;gap:6px" onclick="editingEntryId=\''+esc(e.datetime)+'\';renderCheckTab()">';
      html+='<span style="font-size:.72rem;font-family:var(--mono);color:var(--mu)">'+(time||'--:--')+'</span>';
      if(mcCount)html+='<span style="font-size:.68rem;color:var(--mu)">💊'+mcCount+'</span>';
      if(e.nrs>=0)html+='<span style="font-size:.68rem;color:var(--mu)">'+e.nrs+'점</span>';
      if(e.memo)html+='<span style="font-size:.68rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px">'+esc(e.memo.slice(0,20))+'</span>';
      html+='</span>';
      html+='<button class="btn-toggle" style="color:var(--re);border-color:var(--re);font-size:.6rem;padding:2px 6px" onclick="deleteEntry(\''+esc(e.datetime)+'\')">삭제</button>';
      html+='</div>';
    });
    html+='<button class="btn-toggle" style="width:100%;padding:6px;margin-top:4px;font-size:.72rem" onclick="editingEntryId=null;renderCheckTab()">➕ 새 기록 추가</button>';
    html+='</div>';
  }

  // Time input with skip
  const timeVal=editEntry?.datetime?.slice(11,16)||(editingEntryId?'':kstTimeStr());
  const timeSkip=!editingEntryId&&!isToday;
  html+='<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px">';
  html+='<input type="time" id="entry-time" value="'+timeVal+'"'+(timeSkip?' disabled':'')+' style="border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-family:var(--font);font-size:.8rem;background:var(--sf);color:var(--ink)">';
  html+='<label style="font-size:.68rem;color:var(--mu);display:flex;align-items:center;gap:4px"><input type="checkbox" id="time-skip"'+(timeSkip?' checked':'')+' onchange="document.getElementById(\'entry-time\').disabled=this.checked" style="accent-color:var(--ac)">시간 생략</label></div>';

  // NRS / 컨디션
  const curNrs=anyEntry?.nrs??-1;const nrsSkip=curNrs===-1;
  html+='<div class="card"><div style="font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:4px">컨디션 (0=최악 10=최상)</div>';
  html+='<div class="nrs-wrap"><span class="nrs-val" id="nrs-val">'+(nrsSkip?'-':curNrs)+'</span>';
  html+='<input type="range" id="nrs-range" min="0" max="10" value="'+(nrsSkip?5:curNrs)+'" oninput="document.getElementById(\'nrs-val\').textContent=this.value;document.getElementById(\'nrs-skip\').checked=false"'+(nrsSkip?' disabled':'')+'></div>';
  html+='<div style="display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--mu);margin-top:2px"><input type="checkbox" id="nrs-skip"'+(nrsSkip?' checked':'')+' onchange="const r=document.getElementById(\'nrs-range\');r.disabled=this.checked;document.getElementById(\'nrs-val\').textContent=this.checked?\'-\':r.value" style="accent-color:var(--ac)"> 기록 안 함</div></div>';

  // dailyChecks (기분 항목 — 메인앱 동일)
  const allDC=BUNG_DOMAINS['bung-mental'].dailyChecks;
  if(allDC.length){
    const existDC=anyEntry?.dailyChecks||{};
    html+='<div class="card"><div style="font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:6px">기분 체크 (1-5)</div>';
    allDC.forEach(label=>{
      const cur=existDC[label]||0;
      html+='<div class="dc-row"><span class="dc-label">'+esc(label)+'</span><div class="dc-btns">';
      for(let v=1;v<=5;v++){
        html+='<button class="dc-btn'+(cur===v?' sel':'')+'" data-dc="'+esc(label)+'" data-val="'+v+'" onclick="selectDC(this)">'+v+'</button>';
      }
      html+='</div></div>';
    });
    html+='</div>';
  }

  // Medication check per domain
  let hasMeds=false;
  for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
    const groups=getDomainMeds(domId);if(!groups.length)continue;
    hasMeds=true;
    const existing=findEntry(domId,selectedDate);const existingMc=existing?.medCheck||{};
    html+='<div class="card"><div class="domain-header" style="background:'+dc.color+'15;border:1px solid '+dc.color+'30">';
    html+='<span style="color:'+dc.color+'">'+dc.icon+' '+dc.label+'</span>';
    html+='<span style="margin-left:auto;display:flex;gap:4px"><button class="btn-toggle" onclick="toggleAll(\''+domId+'\',true)">전체 ✓</button><button class="btn-toggle" onclick="toggleAll(\''+domId+'\',false)">전체 ✗</button></span></div>';
    groups.forEach(g=>{
      html+='<div class="condition-name">'+esc(g.condition)+'</div>';
      g.meds.forEach(m=>{
        const isPrn=m.includes('(PRN)')||m.includes('PRN');
        let checked=(m in existingMc)?existingMc[m]:!isPrn;
        html+='<div class="med-row" onclick="this.querySelector(\'input\').checked=!this.querySelector(\'input\').checked">';
        html+='<input type="checkbox" data-domain="'+domId+'" data-med="'+esc(m)+'"'+(checked?' checked':'')+'>';
        html+='<label>'+esc(m)+'</label>';if(isPrn)html+='<span class="prn">PRN</span>';html+='</div>';
      });
    });
    html+='</div>';
  }
  if(!hasMeds)html+='<div class="card" style="text-align:center;padding:20px;color:var(--mu)">등록된 약물 없음</div>';

  // Symptoms
  const allSyms=[...new Set(Object.values(BUNG_DOMAINS).flatMap(d=>d.symptoms||[]))];
  const existingSyms=anyEntry?.symptoms||[];
  if(allSyms.length){
    html+='<div class="card"><div style="font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:6px">증상</div><div class="chips">';
    allSyms.forEach(s=>{html+='<span class="chip'+(existingSyms.includes(s)?' sel':'')+'" data-sym="'+esc(s)+'" onclick="this.classList.toggle(\'sel\')">'+esc(s)+'</span>';});
    html+='</div></div>';
  }

  // Memo + Save
  html+='<div style="margin-bottom:8px"><div style="font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:4px">메모</div>';
  html+='<textarea class="memo" id="daily-memo" placeholder="컨디션, 특이사항..."></textarea></div>';
  html+='<button class="btn-save" id="btn-save" onclick="saveAll()">💾 '+(editingEntryId?'수정 저장':'새 기록 저장')+'</button><div class="save-status" id="save-status"></div>';
  content.innerHTML=html;
  if(anyEntry?.memo)document.getElementById('daily-memo').value=anyEntry.memo;
}
function selectDC(btn){const label=btn.dataset.dc;btn.parentElement.querySelectorAll('.dc-btn').forEach(b=>b.classList.toggle('sel',b===btn&&!btn.classList.contains('sel')));}
function toggleAll(domId,checked){document.querySelectorAll('.med-row input[data-domain="'+domId+'"]').forEach(cb=>cb.checked=checked);}
async function deleteEntry(datetime){
  if(!confirm('이 기록을 삭제하시겠습니까?'))return;
  for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
    const month=datetime.slice(0,7);
    const ml=domainData[domId]?.logs?.[month];if(!ml?.data)continue;
    const idx=ml.data.findIndex(l=>l.datetime===datetime);
    if(idx>=0){
      ml.data.splice(idx,1);
      try{
        const logName=dc.logPrefix+'_'+month+'.json';
        if(ml.fileId)await driveUpdate(ml.fileId,ml.data);
      }catch(e){console.error('Delete error:',e);}
    }
  }
  editingEntryId=null;showToast('🗑 삭제됨');renderCheckTab();
}

function changeDate(delta){const d=new Date(selectedDate+'T00:00:00');d.setDate(d.getDate()+delta);const nd=localDateStr(d);if(nd>kstToday())return;selectedDate=nd;Promise.all(Object.keys(BUNG_DOMAINS).map(id=>loadLogMonth(id,nd.slice(0,7)))).then(()=>renderCheckTab());}

// ═══════════════════════════════════════════════════════════════
// SAVE (medCheck 전체교체 — 키 불일치 해결)
// ═══════════════════════════════════════════════════════════════
async function saveAll(){
  const btn=document.getElementById('btn-save');const statusEl=document.getElementById('save-status');
  btn.disabled=true;btn.textContent='저장 중...';statusEl.innerHTML='';
  const memo=(document.getElementById('daily-memo')?.value||'').trim();
  const nrsSkip=document.getElementById('nrs-skip')?.checked;
  const nrs=nrsSkip?-1:parseInt(document.getElementById('nrs-range')?.value||'5');
  const timeSkip=document.getElementById('time-skip')?.checked;
  const timeVal=timeSkip?'00:00':(document.getElementById('entry-time')?.value||kstTimeStr());
  const symptoms=[...document.querySelectorAll('.chip.sel[data-sym]')].map(c=>c.dataset.sym);
  const dailyChecks={};
  document.querySelectorAll('.dc-btn.sel').forEach(b=>{dailyChecks[b.dataset.dc]=parseInt(b.dataset.val);});

  const domChecks={};
  document.querySelectorAll('.med-row input[type=checkbox]').forEach(cb=>{
    const d=cb.dataset.domain,m=cb.dataset.med;if(!domChecks[d])domChecks[d]={};domChecks[d][m]=cb.checked;
  });

  const _sharedId=crypto.randomUUID(); // 새 기록 시 모든 도메인에 동일 ID
  const results=[];
  for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
    try{
      const ds=domainData[domId];if(!ds?.folderId){results.push({domId,status:'skip'});continue;}
      const month=selectedDate.slice(0,7);await loadLogMonth(domId,month);
      const ml=ds.logs[month];if(!ml){results.push({domId,status:'skip'});continue;}
      const mc=domChecks[domId]||{};

      // 편집: datetime으로 기존 엔트리 찾기 / 새 기록: 새로 생성
      let entry=editingEntryId?ml.data.find(l=>l.datetime===editingEntryId):null;
      if(entry){
        if(Object.keys(mc).length)entry.medCheck=mc;
        entry.memo=memo;entry.nrs=nrs;entry.datetime=selectedDate+'T'+timeVal;
        if(symptoms.length)entry.symptoms=symptoms;
        else delete entry.symptoms;
        if(Object.keys(dailyChecks).length)entry.dailyChecks=dailyChecks;
      }else{
        if(!Object.keys(mc).length&&nrs===-1&&!memo&&!symptoms.length&&!Object.keys(dailyChecks).length){results.push({domId,status:'skip'});continue;}
        entry={id:_sharedId,datetime:selectedDate+'T'+timeVal,nrs,
          medCheck:Object.keys(mc).length?mc:undefined,
          symptoms:symptoms.length?symptoms:undefined,
          dailyChecks:Object.keys(dailyChecks).length?dailyChecks:undefined,
          memo:memo||''};
        ml.data.push(entry);
      }
      ml.data.sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||''));
      const logName=dc.logPrefix+'_'+month+'.json';
      if(ml.fileId)await driveUpdate(ml.fileId,ml.data);else ml.fileId=await driveCreate(logName,ml.data,ds.folderId);
      results.push({domId,status:'ok'});
    }catch(e){console.error('Save '+domId+':',e);results.push({domId,status:'error',msg:e.message});}
  }
  let sh='';results.forEach(r=>{const dc=BUNG_DOMAINS[r.domId];if(!dc||r.status==='skip')return;sh+=dc.icon+' '+dc.label+(r.status==='ok'?' ✅':' ❌ '+esc(r.msg))+'<br>';});
  statusEl.innerHTML=sh;
  const ok=results.every(r=>r.status==='ok'||r.status==='skip');
  btn.disabled=false;btn.textContent=ok?'✅ 저장 완료':'⚠️ 일부 실패';
  if(ok){showToast('✅ 저장 완료');editingEntryId=selectedDate+'T'+timeVal;setTimeout(()=>renderCheckTab(),500);}
  setTimeout(()=>{if(btn)btn.textContent='💾 저장';},3000);
}

// ═══════════════════════════════════════════════════════════════
// BULK SAVE (여러 날짜 일괄 약물 기록)
// ═══════════════════════════════════════════════════════════════
async function saveBulk(){
  if(!bulkDates.size){showToast('날짜를 선택하세요');return;}
  const btn=document.getElementById('bulk-save-btn');btn.disabled=true;btn.textContent='저장 중...';
  // Get current medCheck state from checkboxes in bulk panel
  const domChecks={};
  document.querySelectorAll('#bulk-med-panel input[type=checkbox]').forEach(cb=>{
    const d=cb.dataset.domain,m=cb.dataset.med;if(!domChecks[d])domChecks[d]={};domChecks[d][m]=cb.checked;
  });

  // 조건별 체크 상태 수집
  const condChecked={}; // {domId: {condName: bool}}
  document.querySelectorAll('#bulk-med-panel input[type=checkbox]').forEach(cb=>{
    const d=cb.dataset.domain,c=cb.dataset.condition;
    if(!condChecked[d])condChecked[d]={};
    condChecked[d][c]=cb.checked;
  });

  let saved=0,failed=0;
  for(const date of bulkDates){
    const month=date.slice(0,7);
    for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
      try{
        const ds=domainData[domId];if(!ds?.folderId)continue;
        const checks=condChecked[domId]||{};
        // 해당 날짜의 실제 약물로 medCheck 생성
        const groups=getDomainMeds(domId,date);if(!groups.length)continue;
        const mc={};
        groups.forEach(g=>{
          const taken=checks[g.condition]!==false; // 체크 해제 안 했으면 복용
          g.meds.forEach(m=>{
            const isPrn=m.includes('(PRN)')||m.includes('PRN');
            mc[m]=isPrn?false:taken;
          });
        });
        if(!Object.keys(mc).length)continue;
        await loadLogMonth(domId,month);
        const ml=ds.logs[month];if(!ml)continue;
        let entry=ml.data.find(l=>l.datetime?.slice(0,10)===date);
        if(entry){entry.medCheck=mc;}
        else{entry={id:crypto.randomUUID(),datetime:date+'T09:00',nrs:-1,medCheck:mc,memo:''};ml.data.push(entry);}
        ml.data.sort((a,b)=>(a.datetime||'').localeCompare(b.datetime||''));
        const logName=dc.logPrefix+'_'+month+'.json';
        if(ml.fileId)await driveUpdate(ml.fileId,ml.data);else ml.fileId=await driveCreate(logName,ml.data,ds.folderId);
        saved++;
      }catch(e){failed++;console.error(e);}
    }
  }
  btn.disabled=false;btn.textContent='💾 선택 날짜에 일괄 저장';
  showToast(saved+'건 저장'+(failed?' / '+failed+'건 실패':''));
  bulkMode=false;bulkDates.clear();renderCalendarTab();
}

// ═══════════════════════════════════════════════════════════════
// CALENDAR TAB
// ═══════════════════════════════════════════════════════════════
async function renderCalendarTab(){
  const content=document.getElementById('content');content.innerHTML='<div class="loading">📅 로딩 중...</div>';
  const today=kstToday();
  const months=new Set();for(let i=0;i<35;i++){const d=new Date(today+'T00:00:00');d.setDate(d.getDate()-i);months.add(localDateStr(d).slice(0,7));}
  await Promise.all([...months].flatMap(m=>Object.keys(BUNG_DOMAINS).map(id=>loadLogMonth(id,m))));

  const days=[];
  for(let i=34;i>=0;i--){const d=new Date(today+'T00:00:00');d.setDate(d.getDate()-i);const dateStr=localDateStr(d);
    let totalD=0,takenD=0,hasRecord=false;
    for(const domId of Object.keys(BUNG_DOMAINS)){
      const entry=findEntry(domId,dateStr);
      if(entry?.medCheck&&Object.keys(entry.medCheck).length)hasRecord=true;
      getDomainMeds(domId,dateStr).forEach(g=>g.meds.forEach(m=>{
        if(m.includes('(PRN)')||m.includes('PRN'))return;totalD++;
        if(entry?.medCheck?.[m]===true)takenD++;
      }));
    }
    // 미기록=-1(회색), 기록있음=실제비율
    days.push({date:dateStr,dow:d.getDay(),rate:hasRecord?(totalD>0?Math.round(takenD/totalD*100):100):-1});
  }

  const rec=days.filter(d=>d.rate>=0);
  const overall=rec.length?Math.round(rec.reduce((s,d)=>s+d.rate,0)/rec.length):0;
  const oc=rec.length?(overall>=90?'#10b981':overall>=70?'#f59e0b':'#ef4444'):'var(--mu2)';

  let html='<div class="card" style="text-align:center"><div style="font-size:.72rem;color:var(--mu);margin-bottom:4px">최근 30일 복용 순응도</div>';
  html+=rec.length?'<div style="font-size:2rem;font-weight:700;color:'+oc+'">'+overall+'%</div><div style="height:8px;border-radius:4px;background:var(--bd);overflow:hidden;margin:8px 20px 0"><div style="width:'+overall+'%;height:100%;background:'+oc+';border-radius:4px"></div></div>':'<div style="color:var(--mu2);padding:12px">기록 없음</div>';
  html+='</div>';

  // Bulk mode toggle
  html+='<div style="display:flex;gap:8px;margin-bottom:8px"><button class="btn-toggle" style="flex:1;padding:6px;font-size:.75rem" onclick="toggleBulkMode()">📋 '+(bulkMode?'일괄 모드 끄기':'여러 날짜 일괄 입력')+'</button></div>';

  // Calendar grid
  html+='<div class="card"><div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(l=>html+='<div class="cal-header">'+l+'</div>');
  for(let i=0;i<(days[0]?.dow||0);i++)html+='<div></div>';
  days.forEach(d=>{
    const isT=d.date===today;const isBulk=bulkDates.has(d.date);
    let dc;if(d.rate<0)dc='var(--bd2)';else if(d.rate>=90)dc='#10b981';else if(d.rate>=50)dc='#f59e0b';else dc='#ef4444';
    html+='<div class="cal-day'+(isT?' today':'')+(isBulk?' bulk-sel':'')+'" onclick="'+(bulkMode?'toggleBulkDate(\''+d.date+'\')':'selectCalDate(\''+d.date+'\')')+'">';
    html+='<div>'+parseInt(d.date.slice(8,10))+'</div><div class="dot" style="background:'+dc+'"></div></div>';
  });
  html+='</div><div style="display:flex;justify-content:center;gap:10px;font-size:.6rem;color:var(--mu)">🟢 90%+ 🟡 50-89% 🔴 &lt;50% ⚪ 미기록</div></div>';

  // Bulk med panel (일괄 모드)
  if(bulkMode){
    html+='<div class="card" id="bulk-med-panel"><div style="font-size:.78rem;font-weight:600;margin-bottom:4px">📋 선택된 날짜: '+bulkDates.size+'일</div>';
    html+='<div style="font-size:.62rem;color:var(--mu);margin-bottom:8px">※ 약물 변경이력에 따라 각 날짜의 실제 약물명으로 자동 저장됩니다</div>';
    for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
      const ds=domainData[domId];
      const conds=(ds?.master?.conditions||[]).filter(c=>c.status==='active'||c.status==='remission').filter(c=>(c.medsList||[]).length);
      if(!conds.length)continue;
      html+='<div style="font-size:.72rem;font-weight:600;color:'+dc.color+';margin:8px 0 4px">'+dc.icon+' '+dc.label+'</div>';
      conds.forEach(c=>{
        html+='<div class="med-row" onclick="this.querySelector(\'input\').checked=!this.querySelector(\'input\').checked">';
        html+='<input type="checkbox" data-domain="'+domId+'" data-condition="'+esc(c.name)+'" checked>';
        html+='<label>'+esc(c.name)+' ('+c.medsList.length+'개 약물)</label></div>';
      });
    }
    html+='<button class="btn-save" id="bulk-save-btn" onclick="saveBulk()">💾 선택 날짜에 일괄 저장</button></div>';
  }

  html+='<div id="cal-detail"></div>';
  content.innerHTML=html;
}

function toggleBulkMode(){bulkMode=!bulkMode;if(!bulkMode)bulkDates.clear();renderCalendarTab();}
function toggleBulkDate(date){if(bulkDates.has(date))bulkDates.delete(date);else bulkDates.add(date);renderCalendarTab();}

function selectCalDate(date){
  const el=document.getElementById('cal-detail');if(!el)return;
  let html='<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  html+='<span style="font-size:.85rem;font-weight:600">'+date+'</span>';
  html+='<button class="btn-toggle" style="margin-left:auto;padding:5px 12px;font-size:.72rem" onclick="selectedDate=\''+date+'\';switchTab(0)">✏️ 편집</button></div>';
  for(const [domId,dc] of Object.entries(BUNG_DOMAINS)){
    const groups=getDomainMeds(domId);if(!groups.length)continue;
    const entry=findEntry(domId,date);const mc=entry?.medCheck||{};
    html+='<div style="margin-bottom:6px"><div style="font-size:.72rem;font-weight:600;color:'+dc.color+'">'+dc.icon+' '+dc.label+'</div>';
    if(!Object.keys(mc).length){html+='<div style="font-size:.7rem;color:var(--mu2);padding:1px 0 1px 16px">기록 없음</div></div>';continue;}
    groups.forEach(g=>g.meds.forEach(m=>{const t=mc[m];html+='<div style="font-size:.72rem;padding:1px 0 1px 16px">'+(t===true?'✅':t===false?'❌':'➖')+' '+esc(m)+'</div>';}));
    html+='</div>';
  }
  const ae=Object.keys(BUNG_DOMAINS).map(d=>findEntry(d,date)).find(e=>e);
  if(ae?.nrs>=0)html+='<div style="font-size:.72rem;color:var(--mu);margin-top:4px">컨디션: '+ae.nrs+'/10</div>';
  if(ae?.dailyChecks){const dc=ae.dailyChecks;html+='<div style="font-size:.72rem;color:var(--mu)">기분: '+Object.entries(dc).map(([k,v])=>k+':'+v).join(' ')+'</div>';}
  if(ae?.symptoms?.length)html+='<div style="font-size:.72rem;color:var(--mu)">증상: '+ae.symptoms.map(esc).join(', ')+'</div>';
  if(ae?.memo)html+='<div style="font-size:.72rem;color:var(--mu)">메모: '+esc(ae.memo)+'</div>';
  html+='</div>';el.innerHTML=html;
}
</script>
</body>
</html>
